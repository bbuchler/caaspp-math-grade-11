<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Equation Undo Card</title>
  <desc id="desc">A process card showing how to undo operations while keeping both sides of an equation balanced.</desc>
  <rect width="960" height="540" fill="#f4f8fb"/>
  <rect x="50" y="44" width="860" height="452" rx="18" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
  <text x="82" y="100" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#102a43">Undo the Equation</text>
  <text x="82" y="140" font-family="Segoe UI, Arial" font-size="20" fill="#52606d">Solve by undoing operations in reverse order.</text>
  <g font-family="Segoe UI, Arial">
    <rect x="92" y="184" width="210" height="76" rx="12" fill="#e9f3ff"/>
    <text x="112" y="216" font-size="22" font-weight="700" fill="#1f4f8f">1. Undo add/subtract</text>
    <text x="112" y="244" font-size="18" fill="#334e68">3x + 7 = 31</text>
    <path d="M312 222 H408" stroke="#1f4f8f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="420" y="184" width="210" height="76" rx="12" fill="#ecfdf5"/>
    <text x="440" y="216" font-size="22" font-weight="700" fill="#0f7a3f">Subtract 7</text>
    <text x="440" y="244" font-size="18" fill="#334e68">3x = 24</text>
    <path d="M640 222 H736" stroke="#0f7a3f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="748" y="184" width="150" height="76" rx="12" fill="#fff8e6"/>
    <text x="770" y="216" font-size="22" font-weight="700" fill="#8a5a00">Both sides</text>
    <text x="770" y="244" font-size="18" fill="#334e68">stay equal</text>
    <rect x="92" y="304" width="210" height="76" rx="12" fill="#e9f3ff"/>
    <text x="112" y="336" font-size="22" font-weight="700" fill="#1f4f8f">2. Undo multiply/divide</text>
    <text x="112" y="364" font-size="18" fill="#334e68">3x = 24</text>
    <path d="M312 342 H408" stroke="#1f4f8f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="420" y="304" width="210" height="76" rx="12" fill="#ecfdf5"/>
    <text x="440" y="336" font-size="22" font-weight="700" fill="#0f7a3f">Divide by 3</text>
    <text x="440" y="364" font-size="18" fill="#334e68">x = 8</text>
    <path d="M640 342 H736" stroke="#0f7a3f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="748" y="304" width="150" height="76" rx="12" fill="#fff8e6"/>
    <text x="770" y="336" font-size="22" font-weight="700" fill="#8a5a00">Check it</text>
    <text x="770" y="364" font-size="18" fill="#334e68">3(8)+7=31</text>
    <text x="92" y="438" font-size="24" font-weight="700" fill="#102a43">Rule:</text>
    <text x="160" y="438" font-size="24" fill="#334e68">Whatever you do to one side, do to the other side.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f4f8f"/>
    </marker>
  </defs>
</svg>
