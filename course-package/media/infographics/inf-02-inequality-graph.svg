<svg width="1100" height="620" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Clean Up the Equation</title>
  <desc id="desc">A five-step visual flow for solving multi-step equations: distribute, combine like terms, undo addition or subtraction, undo multiplication or division, and check.</desc>
  <rect width="1100" height="620" rx="28" fill="#f6fbff"/>
  <rect x="28" y="28" width="1044" height="564" rx="22" fill="#ffffff" stroke="#bfd3ea" stroke-width="3"/>

  <text x="70" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f263f">Clean Up the Equation</text>
  <text x="72" y="135" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#35506b">Multi-step equations are easier when you separate cleanup moves from undo moves.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="72" y="178" width="956" height="82" rx="14" fill="#eaf3ff" stroke="#a9c4e7"/>
    <text x="100" y="230" font-size="34" font-weight="800" fill="#0f263f">3(x + 8) + 2x = 79</text>
    <text x="620" y="215" font-size="20" font-weight="700" fill="#2457a6">Start with the original equation</text>
    <text x="620" y="244" font-size="18" fill="#35506b">Do not guess. Clean it up first.</text>

    <g transform="translate(72 310)">
      <rect width="185" height="150" rx="14" fill="#fff8e8" stroke="#e0a73a"/>
      <circle cx="34" cy="34" r="20" fill="#b7791f"/>
      <text x="27" y="43" font-size="25" font-weight="800" fill="#fff">1</text>
      <text x="22" y="78" font-size="21" font-weight="800" fill="#0f263f">Distribute</text>
      <text x="22" y="110" font-size="17" fill="#35506b">3(x + 8)</text>
      <text x="22" y="133" font-size="17" fill="#35506b">becomes 3x + 24</text>
    </g>

    <g transform="translate(270 310)">
      <rect width="185" height="150" rx="14" fill="#eef8f2" stroke="#8fc6a2"/>
      <circle cx="34" cy="34" r="20" fill="#0f7a3f"/>
      <text x="27" y="43" font-size="25" font-weight="800" fill="#fff">2</text>
      <text x="22" y="78" font-size="21" font-weight="800" fill="#0f263f">Combine</text>
      <text x="22" y="110" font-size="17" fill="#35506b">3x + 2x</text>
      <text x="22" y="133" font-size="17" fill="#35506b">becomes 5x</text>
    </g>

    <g transform="translate(468 310)">
      <rect width="185" height="150" rx="14" fill="#f0f5ff" stroke="#9db6df"/>
      <circle cx="34" cy="34" r="20" fill="#2457a6"/>
      <text x="27" y="43" font-size="25" font-weight="800" fill="#fff">3</text>
      <text x="22" y="78" font-size="21" font-weight="800" fill="#0f263f">Undo +24</text>
      <text x="22" y="110" font-size="17" fill="#35506b">Subtract 24</text>
      <text x="22" y="133" font-size="17" fill="#35506b">from both sides</text>
    </g>

    <g transform="translate(666 310)">
      <rect width="185" height="150" rx="14" fill="#fff1f1" stroke="#e3a0a0"/>
      <circle cx="34" cy="34" r="20" fill="#b83232"/>
      <text x="27" y="43" font-size="25" font-weight="800" fill="#fff">4</text>
      <text x="22" y="78" font-size="21" font-weight="800" fill="#0f263f">Undo x5</text>
      <text x="22" y="110" font-size="17" fill="#35506b">Divide by 5</text>
      <text x="22" y="133" font-size="17" fill="#35506b">to isolate x</text>
    </g>

    <g transform="translate(864 310)">
      <rect width="164" height="150" rx="14" fill="#f4f7fb" stroke="#b8c6d8"/>
      <circle cx="34" cy="34" r="20" fill="#516173"/>
      <text x="27" y="43" font-size="25" font-weight="800" fill="#fff">5</text>
      <text x="22" y="78" font-size="21" font-weight="800" fill="#0f263f">Check</text>
      <text x="22" y="110" font-size="17" fill="#35506b">Put x = 11</text>
      <text x="22" y="133" font-size="17" fill="#35506b">back in</text>
    </g>

    <text x="100" y="528" font-size="28" font-weight="800" fill="#0f263f">Cleaned equation: 5x + 24 = 79</text>
    <text x="100" y="562" font-size="23" fill="#35506b">Then solve: 5x = 55, so x = 11.</text>
  </g>
</svg>
