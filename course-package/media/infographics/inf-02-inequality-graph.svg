<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Inequality Graph Decision Table</title>
  <desc id="desc">A chart matching inequality symbols with open or closed points and shading direction.</desc>
  <rect width="960" height="540" fill="#f4f8fb"/>
  <rect x="56" y="48" width="852" height="444" rx="18" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
  <text x="86" y="104" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#102a43">Inequality Graph Decisions</text>
  <g font-family="Segoe UI, Arial" font-size="24">
    <text x="102" y="164" font-weight="700" fill="#1f4f8f">Symbol</text>
    <text x="274" y="164" font-weight="700" fill="#1f4f8f">Boundary</text>
    <text x="506" y="164" font-weight="700" fill="#1f4f8f">Direction</text>
    <text x="720" y="164" font-weight="700" fill="#1f4f8f">Meaning</text>
    <line x1="86" y1="182" x2="880" y2="182" stroke="#d8e2ea" stroke-width="3"/>
    <g fill="#334e68">
      <text x="118" y="232">&lt;</text><text x="274" y="232">open point</text><text x="506" y="232">shade left</text><text x="720" y="232">less than</text>
      <text x="112" y="292">&lt;=</text><text x="274" y="292">closed point</text><text x="506" y="292">shade left</text><text x="720" y="292">at most</text>
      <text x="118" y="352">&gt;</text><text x="274" y="352">open point</text><text x="506" y="352">shade right</text><text x="720" y="352">greater than</text>
      <text x="112" y="412">&gt;=</text><text x="274" y="412">closed point</text><text x="506" y="412">shade right</text><text x="720" y="412">at least</text>
    </g>
    <circle cx="235" cy="225" r="10" fill="#fff" stroke="#b42318" stroke-width="4"/>
    <circle cx="235" cy="285" r="11" fill="#0f7a3f"/>
    <circle cx="235" cy="345" r="10" fill="#fff" stroke="#b42318" stroke-width="4"/>
    <circle cx="235" cy="405" r="11" fill="#0f7a3f"/>
    <text x="86" y="468" font-size="22" fill="#52606d">Quick test: pick a number on the shaded side and see if it makes the inequality true.</text>
  </g>
</svg>
