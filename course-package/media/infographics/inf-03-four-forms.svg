<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Four Ways To Show A Line</title>
  <desc id="desc">A four-panel map connecting a rideshare situation to a table, equation, and graph.</desc>
  <rect width="960" height="540" fill="#f4f8fb"/>
  <text x="58" y="70" font-family="Segoe UI, Arial" font-size="36" font-weight="700" fill="#102a43">Same Line, Four Stories</text>
  <g font-family="Segoe UI, Arial">
    <rect x="58" y="104" width="400" height="160" rx="16" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
    <text x="86" y="144" font-size="26" font-weight="700" fill="#1f4f8f">Words</text>
    <text x="86" y="184" font-size="22" fill="#334e68">$5 to start</text>
    <text x="86" y="218" font-size="22" fill="#334e68">+$2 per mile</text>
    <rect x="502" y="104" width="400" height="160" rx="16" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
    <text x="530" y="144" font-size="26" font-weight="700" fill="#1f4f8f">Equation</text>
    <text x="530" y="208" font-size="38" font-weight="700" fill="#0f766e">C = 2m + 5</text>
    <rect x="58" y="304" width="400" height="160" rx="16" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
    <text x="86" y="344" font-size="26" font-weight="700" fill="#1f4f8f">Table</text>
    <text x="114" y="386" font-size="22" fill="#334e68">m: 0  1  2  3</text>
    <text x="114" y="426" font-size="22" fill="#334e68">C: 5  7  9  11</text>
    <rect x="502" y="304" width="400" height="160" rx="16" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
    <text x="530" y="344" font-size="26" font-weight="700" fill="#1f4f8f">Graph</text>
    <line x1="566" y1="432" x2="840" y2="432" stroke="#52606d" stroke-width="3"/>
    <line x1="566" y1="432" x2="566" y2="372" stroke="#52606d" stroke-width="3"/>
    <line x1="566" y1="418" x2="840" y2="372" stroke="#0f766e" stroke-width="5"/>
    <circle cx="566" cy="418" r="7" fill="#b7791f"/>
    <circle cx="638" cy="406" r="7" fill="#b7791f"/>
    <circle cx="710" cy="394" r="7" fill="#b7791f"/>
    <circle cx="782" cy="382" r="7" fill="#b7791f"/>
  </g>
</svg>
