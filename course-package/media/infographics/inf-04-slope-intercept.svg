<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Slope And Intercept In Context</title>
  <desc id="desc">An annotated line graph showing starting amount as the intercept and dollars per ticket as the slope.</desc>
  <rect width="960" height="540" fill="#f4f8fb"/>
  <rect x="70" y="52" width="840" height="438" rx="18" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
  <text x="104" y="106" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#102a43">Slope and Intercept Have Jobs</text>
  <g font-family="Segoe UI, Arial">
    <line x1="170" y1="420" x2="780" y2="420" stroke="#52606d" stroke-width="4"/>
    <line x1="170" y1="420" x2="170" y2="160" stroke="#52606d" stroke-width="4"/>
    <line x1="170" y1="350" x2="750" y2="188" stroke="#0f766e" stroke-width="6"/>
    <circle cx="170" cy="350" r="9" fill="#b7791f"/>
    <circle cx="430" cy="277" r="9" fill="#b7791f"/>
    <text x="122" y="454" font-size="20" fill="#52606d">tickets sold</text>
    <text x="92" y="150" font-size="20" fill="#52606d">money</text>
    <rect x="216" y="292" width="260" height="78" rx="12" fill="#fff8e6" stroke="#f3d48a" stroke-width="2"/>
    <text x="234" y="322" font-size="22" font-weight="700" fill="#8a5a00">y-intercept</text>
    <text x="234" y="350" font-size="18" fill="#334e68">starting amount before sales</text>
    <rect x="510" y="198" width="292" height="84" rx="12" fill="#e9f3ff" stroke="#b8d7f5" stroke-width="2"/>
    <text x="528" y="230" font-size="22" font-weight="700" fill="#1f4f8f">slope</text>
    <text x="528" y="258" font-size="18" fill="#334e68">money gained for each 1 ticket</text>
    <text x="104" y="474" font-size="22" fill="#334e68">In R = 12s + 50, 12 is dollars per shirt and 50 is the starting amount.</text>
  </g>
</svg>
