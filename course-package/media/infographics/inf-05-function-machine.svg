<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Function Machine</title>
  <desc id="desc">A diagram showing an input going through a function rule to create an output.</desc>
  <rect width="960" height="540" fill="#f4f8fb"/>
  <text x="70" y="90" font-family="Segoe UI, Arial" font-size="38" font-weight="700" fill="#102a43">Function Notation = Input, Rule, Output</text>
  <g font-family="Segoe UI, Arial">
    <rect x="86" y="196" width="190" height="110" rx="18" fill="#e9f3ff" stroke="#b8d7f5" stroke-width="3"/>
    <text x="122" y="240" font-size="26" font-weight="700" fill="#1f4f8f">Input</text>
    <text x="122" y="278" font-size="30" fill="#334e68">x = 3</text>
    <path d="M292 251 H386" stroke="#52606d" stroke-width="6" marker-end="url(#arrow)"/>
    <rect x="404" y="166" width="252" height="170" rx="18" fill="#ffffff" stroke="#d8e2ea" stroke-width="3"/>
    <text x="456" y="218" font-size="26" font-weight="700" fill="#0f766e">Rule</text>
    <text x="452" y="274" font-size="34" font-weight="700" fill="#102a43">f(x)=4x+9</text>
    <path d="M674 251 H768" stroke="#52606d" stroke-width="6" marker-end="url(#arrow)"/>
    <rect x="786" y="196" width="170" height="110" rx="18" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="3"/>
    <text x="824" y="240" font-size="26" font-weight="700" fill="#0f7a3f">Output</text>
    <text x="824" y="278" font-size="30" fill="#334e68">f(3)=21</text>
    <text x="86" y="400" font-size="24" fill="#334e68">The number inside the parentheses is the input. Substitute it into the rule.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#52606d"/>
    </marker>
  </defs>
</svg>
