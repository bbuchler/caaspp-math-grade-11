<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAASPP Math Success Academy - Week 1 Preview</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #5d6b7a;
      --line: #d9e1e8;
      --soft: #f5f8fb;
      --panel: #ffffff;
      --blue: #2457a6;
      --teal: #0f766e;
      --gold: #b7791f;
      --red: #b42318;
      --green: #0f7a3f;
      --shadow: 0 10px 28px rgba(23, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: #eef3f7;
      line-height: 1.5;
    }

    .course-header {
      background: #0f263f;
      color: #fff;
      padding: 22px clamp(16px, 4vw, 44px);
      border-bottom: 5px solid #f2b84b;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .course-header h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.1rem);
      letter-spacing: 0;
    }

    .course-header p {
      margin: 6px 0 0;
      max-width: 920px;
      color: #d7e3ef;
      font-size: 0.98rem;
    }

    .header-shell {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .teacher-nav {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .teacher-nav.visible {
      display: flex;
    }

    .teacher-nav a,
    .teacher-nav button {
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 6px;
      padding: 8px 11px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .teacher-nav a:hover,
    .teacher-nav button:hover {
      background: rgba(255,255,255,0.18);
    }

    .teacher-nav a.nav-primary {
      background: #f2b84b;
      border-color: #f2b84b;
      color: #102a44;
    }

    .teacher-nav a.nav-primary:hover {
      background: #ffd36a;
      border-color: #ffd36a;
    }

    .nav-user-name {
      color: #d7e3ef;
      font-weight: 800;
      padding: 8px 4px;
    }

    .shell {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 22px;
      padding: 22px clamp(14px, 3vw, 36px) 36px;
      max-width: 1400px;
      margin: 0 auto;
    }

    aside {
      position: sticky;
      top: 16px;
      align-self: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .side-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #123354;
      color: #fff;
    }

    .side-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .side-head p {
      margin: 6px 0 0;
      color: #d7e3ef;
      font-size: 0.86rem;
    }

    .home-button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff8e6;
      text-align: left;
      padding: 13px 16px;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
    }

    .home-button:hover,
    .home-button.active {
      background: #edf6ff;
    }

    .home-button strong {
      display: block;
      color: #153d72;
      font-size: 0.95rem;
    }

    .home-button span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2px;
    }

    .lesson-list {
      display: grid;
      gap: 0;
    }

    .lesson-button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: left;
      padding: 13px 16px;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
    }

    .lesson-button:hover,
    .lesson-button.active {
      background: #edf6ff;
    }

    .lesson-button.active {
      border-left: 5px solid var(--blue);
      padding-left: 11px;
    }

    .lesson-button:disabled {
      cursor: default;
      opacity: 0.72;
      background: #f7f9fb;
    }

    .lesson-button:disabled:hover {
      background: #f7f9fb;
    }

    .lesson-button strong {
      display: block;
      font-size: 0.95rem;
    }

    .lesson-button span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2px;
    }

    main {
      min-width: 0;
    }

    .notice {
      background: #fff8e6;
      border: 1px solid #f3d48a;
      border-left: 5px solid var(--gold);
      border-radius: 8px;
      padding: 13px 15px;
      margin-bottom: 18px;
      color: #4d390d;
    }

    .lesson-hero,
    .section-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .lesson-hero {
      padding: clamp(18px, 4vw, 28px);
    }

    .lesson-kicker {
      color: var(--teal);
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .home-grid,
    .module-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .module-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #fbfcfd;
    }

    .module-card.current {
      border-left: 5px solid var(--blue);
      background: #edf6ff;
    }

    .module-card strong {
      display: block;
      margin-bottom: 4px;
    }

    .module-card span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .module-card p {
      margin: 8px 0 0;
      color: #24476b;
      font-size: 0.9rem;
    }

    .lesson-mini-list {
      margin: 10px 0 0;
      padding-left: 20px;
    }

    .lesson-hero h2 {
      margin: 4px 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.55rem);
      letter-spacing: 0;
    }

    .target {
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
      margin-top: 10px;
      padding: 9px 11px;
      border-radius: 6px;
      background: #e9f3ff;
      color: #153d72;
      font-weight: 650;
    }

    .target-label {
      color: var(--teal);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .standards-heading {
      margin: 14px 0 6px;
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 900;
    }

    .standard-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 8px;
    }

    .standard-chip {
      border: 1px solid #c9d8e8;
      border-radius: 999px;
      background: #fbfdff;
      color: #24476b;
      padding: 6px 9px;
      font-size: 0.88rem;
      font-weight: 750;
    }

    .standard-chip strong {
      color: var(--teal);
      margin-right: 4px;
    }

    .application-note {
      margin: 12px 0 0;
      border-left: 4px solid var(--gold);
      border-radius: 6px;
      background: #fffdf5;
      color: #503b0b;
      padding: 10px 12px;
    }

    .section-card header {
      background: var(--soft);
      color: var(--ink);
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
    }

    .section-card header h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .section-body {
      padding: 16px 18px 18px;
    }

    .video-box {
      border: 1px dashed #aac0d6;
      background: #f7fbff;
      border-radius: 8px;
      padding: 14px;
      margin: 10px 0 14px;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f263f;
      margin: 10px 0;
    }

    .video-poster {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f263f;
      margin: 10px 0;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
    }

    .video-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,38,63,0.05), rgba(15,38,63,0.45));
    }

    .video-play {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.92);
      background: rgba(36,87,166,0.9);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
    }

    .video-play svg {
      margin-left: 5px;
    }

    .overview-video {
      display: block;
      width: 100%;
      max-height: 520px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f263f;
    }

    .vocab-box {
      border: 1px solid #bfd3e8;
      border-left: 5px solid var(--teal);
      border-radius: 8px;
      background: #f6fbff;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .vocab-box summary {
      cursor: pointer;
      padding: 14px 18px;
      font-weight: 800;
      color: #102a44;
      list-style-position: inside;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 0 18px 18px;
    }

    .vocab-term {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .vocab-term strong {
      display: block;
      color: #153d72;
      margin-bottom: 3px;
    }

    .vocab-term span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .math-expression {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      vertical-align: middle;
    }

    .math-negative {
      font-weight: 800;
      margin-right: 1px;
    }

    .fraction {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      min-width: 1.15em;
      margin: 0 1px;
      vertical-align: middle;
      font-variant-numeric: lining-nums tabular-nums;
    }

    .fraction span:first-child {
      border-bottom: 2px solid currentColor;
      line-height: 1;
      width: 100%;
      text-align: center;
      padding: 0 2px 2px;
    }

    .fraction span:last-child {
      line-height: 1;
      padding-top: 2px;
    }

    .video-box a {
      color: var(--blue);
      font-weight: 700;
    }

    .watch-for {
      margin: 10px 0 0;
      color: #24476b;
    }

    .lesson-image {
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f7fbff;
    }

    .lesson-image img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .lesson-image figcaption {
      padding: 9px 12px;
      color: #24476b;
      font-size: 0.9rem;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      margin-top: 12px;
      background: #fff;
    }

    .question p {
      margin: 0 0 10px;
      font-weight: 650;
    }

    .option {
      display: block;
      margin: 7px 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 1px solid #b9c7d5;
      border-radius: 6px;
      padding: 10px;
      font: inherit;
      min-height: 42px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .feedback {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      font-size: 0.92rem;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.correct { background: #e8f7ee; color: var(--green); }
    .feedback.review { background: #fff8e6; color: #6c4a00; }
    .feedback.incorrect { background: #fff0ee; color: var(--red); }
    .question.locked {
      border-color: #bfd3e8;
      background: #fbfdff;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button.check {
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button.check:hover { background: #1c4585; }
    button.check:disabled {
      cursor: default;
      opacity: 0.72;
      background: #627d98;
    }

    button.secondary {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary:hover { background: var(--soft); }

    .steps {
      margin: 10px 0;
      padding-left: 22px;
    }

    .common-mistake {
      border-left: 4px solid var(--gold);
      background: #fff8e6;
      padding: 10px 12px;
      border-radius: 6px;
      color: #503b0b;
    }

    .balance-lab {
      border: 1px solid #bfd3e8;
      background: #f6fbff;
      border-radius: 8px;
      padding: 14px;
      margin: 14px 0;
    }

    .balance-equation {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--primary);
      font-size: 1.25rem;
      font-weight: 850;
      padding: 9px 12px;
      margin-bottom: 12px;
    }

    .balance-scale {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
      border: 2px dashed #aac0d6;
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
      transition: border-color 0.2s, background 0.2s;
    }

    .balance-drop-label {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 1px dashed #b8d2ee;
      border-radius: 6px;
      background: #edf6ff;
      color: #153d72;
      font-size: 0.88rem;
      font-weight: 800;
      text-align: center;
      padding: 6px 8px;
    }

    .balance-scale.drag-over {
      border-color: var(--blue);
      background: #edf6ff;
    }

    .balance-pan {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 10px;
      display: flex;
      align-content: flex-start;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 7px;
    }

    .balance-equals {
      align-self: center;
      color: var(--primary);
      font-size: 1.7rem;
      font-weight: 900;
    }

    .math-tile {
      min-width: 38px;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--primary);
      font-weight: 850;
      padding: 5px 8px;
    }

    .math-tile.unit {
      min-width: 28px;
      min-height: 28px;
      padding: 3px 6px;
      background: #fff8e6;
      color: #6c4a00;
      border-color: #f3d48a;
    }

    .math-tile.variable {
      background: #e9f3ff;
      color: #153d72;
      border-color: #b8d2ee;
    }

    .math-tile.constant {
      background: #fff8e6;
      color: #6c4a00;
      border-color: #f3d48a;
    }

    .math-tile.answer {
      background: #e8f7ee;
      color: var(--green);
      border-color: #a9dfbd;
    }

    .math-tile.draggable {
      cursor: grab;
      box-shadow: 0 0 0 3px rgba(36, 87, 166, 0.11);
    }

    .math-tile.draggable:active {
      cursor: grabbing;
    }

    .remove-zone {
      margin-top: 12px;
      border: 2px dashed #f3d48a;
      border-radius: 8px;
      background: #fffdf5;
      padding: 10px;
      min-height: 82px;
    }

    .remove-zone.drag-over {
      border-color: var(--gold);
      background: #fff8e6;
    }

    .remove-zone strong {
      display: block;
      color: #6c4a00;
      margin-bottom: 6px;
    }

    .removed-tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 32px;
      align-items: center;
    }

    .removed-count {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 6px;
    }

    .balance-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .balance-actions-label {
      width: 100%;
      color: var(--primary);
      font-weight: 850;
      font-size: 0.9rem;
    }

    .balance-action {
      border: 1px solid #b8d2ee;
      border-radius: 8px;
      background: #fff;
      color: #153d72;
      padding: 10px 12px;
      font-weight: 800;
      cursor: grab;
    }

    .balance-action::before {
      content: "::::";
      display: inline-block;
      color: #6f8baa;
      font-size: 0.75rem;
      letter-spacing: -2px;
      margin-right: 8px;
      transform: rotate(90deg);
    }

    .balance-action.current {
      background: #e9f3ff;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(36, 87, 166, 0.14);
    }

    .balance-action.done {
      background: #e8f7ee;
      color: var(--green);
      border-color: #a9dfbd;
      cursor: default;
    }

    .balance-action.locked {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .divide-card {
      border: 1px solid #a9dfbd;
      border-radius: 8px;
      background: #e8f7ee;
      color: var(--green);
      padding: 10px 12px;
      font-weight: 850;
      cursor: grab;
    }

    .divide-card[hidden] {
      display: none;
    }

    .undo-board {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
    }

    .undo-token {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      color: var(--primary);
      padding: 9px 12px;
      font-weight: 900;
      min-width: 46px;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .undo-token.draggable {
      cursor: grab;
      background: #e9f3ff;
      border-color: #b8d2ee;
      box-shadow: 0 0 0 3px rgba(36, 87, 166, 0.13);
    }

    .undo-token.draggable:active {
      cursor: grabbing;
    }

    .operation-bank {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin: 0 0 12px;
      padding: 10px;
      border: 1px solid #d7e6f4;
      border-radius: 8px;
      background: #fbfdff;
    }

    .operation-bank strong {
      color: var(--primary);
      margin-right: 4px;
    }

    .operation-tile {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--primary);
      padding: 9px 13px;
      font-weight: 900;
      min-width: 52px;
      text-align: center;
    }

    .operation-tile.draggable {
      cursor: grab;
      background: #e9f3ff;
      border-color: #b8d2ee;
      box-shadow: 0 0 0 3px rgba(36, 87, 166, 0.13);
    }

    .operation-tile.done {
      background: #e8f7ee;
      border-color: #a9dfbd;
      color: var(--green);
    }

    .operation-tile.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .undo-drop-zone {
      border: 2px dashed #aac0d6;
      border-radius: 8px;
      background: #f7fbff;
      color: #153d72;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      font-weight: 850;
    }

    .undo-drop-zone.drag-over {
      background: #edf6ff;
      border-color: var(--blue);
    }

    .balance-feedback {
      margin-top: 10px;
      color: #24476b;
      font-weight: 650;
    }

    .infographic {
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .infographic img {
      display: block;
      width: 100%;
      height: auto;
    }

    .finish-card {
      border: 1px solid #bfd3e8;
      border-radius: 10px;
      background: #f7fbff;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .finish-card::after {
      content: "🏁";
      position: absolute;
      right: 18px;
      top: 12px;
      font-size: 3.25rem;
      opacity: 0.18;
      pointer-events: none;
    }

    .finish-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: #e8f7ee;
      color: var(--green);
      font-weight: 900;
      padding: 6px 10px;
      margin-bottom: 10px;
    }

    .finish-title {
      margin: 0 0 6px;
      color: var(--primary);
      font-size: 1.35rem;
    }

    .finish-summary {
      margin-bottom: 14px;
      color: #24476b;
    }

    .learned-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    .learned-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 9px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fff;
    }

    .learned-check {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e8f7ee;
      color: var(--green);
      font-weight: 900;
      line-height: 1;
    }

    .learned-item strong {
      display: block;
      color: var(--teal);
      margin-bottom: 3px;
    }

    .learned-item span {
      color: #24476b;
    }

    .readiness-panel {
      border-top: 1px solid #d7e6f4;
      padding-top: 14px;
      margin-top: 4px;
    }

    .readiness-panel h4 {
      margin: 0 0 10px;
      color: var(--primary);
      font-size: 1rem;
    }

    .readiness-grid,
    .gate {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .readiness-tile,
    .gate div {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .readiness-tile strong,
    .gate strong {
      display: block;
      color: var(--teal);
      margin-bottom: 3px;
    }

    .readiness-tile.ready {
      border-color: #b9e3c7;
      background: #f6fff9;
    }

    .readiness-tile.practice {
      border-color: #f3d48a;
      background: #fffdf5;
    }

    .readiness-tile.bonus {
      border-color: #b8d2ee;
      background: #f7fbff;
    }

    .challenge-box {
      margin-top: 14px;
      border: 1px solid #f3d48a;
      border-radius: 8px;
      background: #fffdf5;
      padding: 12px;
    }

    .challenge-box p {
      margin-bottom: 10px;
      color: #503b0b;
    }

    .challenge-box strong {
      color: #6c4a00;
    }

    .submit-box {
      margin-top: 14px;
      border: 1px solid #b8d2ee;
      border-radius: 8px;
      background: #edf6ff;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .submit-box p {
      margin: 0;
      color: #24476b;
      flex: 1 1 260px;
    }

    .submit-status {
      margin-top: 10px;
      font-weight: 750;
      color: var(--green);
      display: none;
    }

    .submit-status.show {
      display: block;
    }

    button.submit-lesson {
      border: 0;
      border-radius: 6px;
      background: var(--green);
      color: #fff;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    button.submit-lesson:hover {
      background: #0a6130;
    }

    .study-buddy-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      border: 0;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(23, 32, 42, 0.22);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }

    .study-buddy-btn:hover {
      background: #9a6216;
      transform: scale(1.05);
    }

    .study-buddy-btn.active {
      background: #4b5563;
    }

    .study-buddy-panel {
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 370px;
      height: 520px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 36px rgba(23, 32, 42, 0.2);
      z-index: 40;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      pointer-events: none;
      transition: opacity 0.22s, transform 0.22s;
    }

    .study-buddy-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .sb-header {
      background: #123354;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sb-title {
      font-weight: 700;
    }

    .sb-close {
      background: none;
      border: 0;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .sb-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f5f8fb;
    }

    .sb-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.45;
      word-wrap: break-word;
    }

    .sb-msg-bot {
      background: #fff;
      color: var(--ink);
      align-self: flex-start;
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }

    .sb-msg-bot p {
      margin: 0 0 6px;
    }

    .sb-msg-bot p:last-child {
      margin-bottom: 0;
    }

    .sb-msg-user {
      background: var(--blue);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .sb-typing {
      display: flex;
      gap: 4px;
      padding: 12px 18px;
    }

    .sb-typing span {
      width: 8px;
      height: 8px;
      background: #9aa8b6;
      border-radius: 50%;
      animation: sb-bounce 1.2s infinite;
    }

    .sb-typing span:nth-child(2) { animation-delay: 0.15s; }
    .sb-typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes sb-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .sb-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sb-suggestion {
      background: #fff;
      border: 1px solid var(--gold);
      color: #6d4a00;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .sb-suggestion:hover {
      background: #fff8e6;
    }

    .sb-input-area {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: #fff;
      flex-shrink: 0;
    }

    .sb-input {
      flex: 1;
      border: 1px solid #b9c7d5;
      border-radius: 999px;
      padding: 8px 14px;
      font: inherit;
      outline: none;
    }

    .sb-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 0;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    @media (max-width: 860px) {
      .course-header {
        position: static;
      }

      .teacher-nav {
        width: 100%;
        justify-content: stretch;
      }

      .teacher-nav a,
      .teacher-nav button {
        flex: 1 1 auto;
        text-align: center;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }

      .gate {
        grid-template-columns: 1fr;
      }

      .learned-list,
      .readiness-grid {
        grid-template-columns: 1fr;
      }

      .balance-scale {
        grid-template-columns: 1fr;
      }

      .balance-drop-label {
        grid-column: auto;
      }

      .balance-equals {
        text-align: center;
      }

      .home-grid,
      .module-grid {
        grid-template-columns: 1fr;
      }

      .vocab-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .study-buddy-panel {
        width: calc(100% - 16px);
        height: calc(100% - 120px);
        right: 8px;
        bottom: 88px;
      }

      .study-buddy-btn {
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="course-header">
    <div class="header-shell">
      <div class="brand-row">
        <div>
          <h1>CAASPP Math Success Academy</h1>
          <p>Module 1 preview: solving equations, interpreting expressions, and building algebra fluency.</p>
        </div>
      </div>
      <nav id="course-nav" class="teacher-nav" aria-label="Course navigation">
        <a href="teacher-dashboard.html">Gradebook</a>
        <a href="teacher-guide.html">Teacher Guide</a>
        <a href="preview.html">Course Overview</a>
        <span class="nav-user-name" id="preview-user-name"></span>
        <button id="preview-sign-out" type="button">Sign Out</button>
      </nav>
    </div>
  </header>

  <div class="shell">
    <aside>
      <div class="side-head">
        <h2>Module 1: Algebra Fluency</h2>
        <p>Five lessons that build from basic equation solving to real-world equation modeling.</p>
      </div>
      <button id="home-button" class="home-button" type="button">
        <strong>Course Overview</strong>
        <span>See the big picture before opening a lesson.</span>
      </button>
      <div id="lesson-list" class="lesson-list"></div>
    </aside>

    <main>
      <div id="lesson-root"></div>
    </main>
  </div>

  <button class="study-buddy-btn" type="button" aria-label="Open Study Buddy">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
  <div class="study-buddy-panel" aria-live="polite">
    <div class="sb-header">
      <span class="sb-title">Study Buddy</span>
      <button class="sb-close" type="button" aria-label="Close Study Buddy">&times;</button>
    </div>
    <div class="sb-messages"></div>
    <div class="sb-input-area">
      <input type="text" class="sb-input" placeholder="Ask about this lesson..." maxlength="500">
      <button class="sb-send" type="button" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shared-course-data.js?v=class-sections-1"></script>
  <script src="js/auth.js"></script>
  <script>
    const lessonIds = ["01", "02", "03", "04", "05"];
    const COURSE_ASSET_VERSION = "2026-06-09-module-1-lesson-2b";
    const courseHome = {
      title: "CAASPP Math Success Academy",
      subtitle: "Build confidence with the math moves that show up again and again on CAASPP.",
      currentModule: "Module 1: Linear Foundations",
      currentModuleSummary: "This module builds equation fluency: undo simple equations, clean up multi-step equations, solve equations with variables on both sides, rearrange formulas, and apply those moves in a real-world performance task.",
      modules: [
        {
          title: "Module 1: Linear Foundations",
          range: "Lessons 1-5",
          status: "Open pilot module",
          summary: "One-step, two-step, multi-step, variables on both sides, literal equations, and a performance task."
        },
        {
          title: "Module 2",
          range: "Lessons 6-10",
          status: "Planned",
          summary: "Next CAASPP math focus area after the Lesson 1 pilot pattern is approved."
        },
        {
          title: "Module 3",
          range: "Lessons 11-15",
          status: "Planned",
          summary: "Additional CAASPP practice lessons using the same lesson structure."
        },
        {
          title: "Module 4",
          range: "Lessons 16-20",
          status: "Planned",
          summary: "Review, mixed practice, and performance-task style preparation."
        }
      ],
      overviewVideo: {
        title: "Lesson 1 Overview: Deconstructing the Equation",
        src: "media/videos/module-01-overview-deconstructing-the-equation-web.mp4",
        poster: "media/videos/module-01-overview-deconstructing-the-equation-poster.png"
      },
      moduleMoves: [
        "Undo equations while keeping both sides balanced.",
        "Clean up equations before solving.",
        "Use the distributive property and combine like terms.",
        "Decide whether an equation has one solution, no solution, or infinitely many solutions.",
        "Rearrange formulas and apply equation-solving strategies in context."
      ]
    };
    const state = { lessons: [], active: null, profile: null, savedResponses: {} };

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    async function loadLessons() {
      const loaded = [];
      for (const id of lessonIds) {
        const response = await fetch(`lessons/lesson-${id}.json?v=${COURSE_ASSET_VERSION}`);
        loaded.push(await response.json());
      }
      state.lessons = loaded;
      renderList();
      await renderInitialRoute();
    }

    async function renderInitialRoute() {
      const params = new URLSearchParams(window.location.search);
      const lessonParam = params.get("lesson");
      if (lessonParam) {
        const index = state.lessons.findIndex((lesson) => lesson.lessonId === lessonParam.padStart(2, "0"));
        if (index >= 0) {
          await renderLesson(index);
          return;
        }
      }
      renderHome();
    }

    function renderList() {
      const list = document.getElementById("lesson-list");
      const isOpenLesson = (lesson) => Number(lesson.lessonId) <= 2;
      list.innerHTML = state.lessons.map((lesson, index) => `
        <button class="lesson-button ${index === state.active ? "active" : ""}" data-index="${index}" ${isOpenLesson(lesson) ? "" : "disabled"}>
          <strong>Lesson ${lesson.lessonId}: ${escapeHtml(lesson.title)}</strong>
          <span>${escapeHtml(lesson.learningTarget)}${isOpenLesson(lesson) ? "" : " (coming soon)"}</span>
        </button>
      `).join("");

      list.querySelectorAll("button").forEach((button) => {
        if (button.disabled) return;
        button.addEventListener("click", () => renderLesson(Number(button.dataset.index)));
      });

      const homeButton = document.getElementById("home-button");
      homeButton.classList.toggle("active", state.active === null);
      homeButton.addEventListener("click", () => {
        history.replaceState(null, "", "preview.html");
        renderHome();
      });
    }

    function renderHome() {
      state.active = null;
      renderList();
      const root = document.getElementById("lesson-root");
      root.innerHTML = `
        <section class="lesson-hero">
          <div class="lesson-kicker">Course Overview</div>
          <h2>${escapeHtml(courseHome.title)}</h2>
          <p>${escapeHtml(courseHome.subtitle)}</p>
          <div class="target">${escapeHtml(courseHome.currentModule)}</div>
        </section>
        <section class="section-card">
          <header><h3>Course Map</h3></header>
          <div class="section-body">
            <p>Each module holds five lessons. Module 1 focuses on equation fluency, from basic inverse operations to real-world performance tasks.</p>
            <div class="module-grid">
              ${courseHome.modules.map((module, index) => `
                <div class="module-card ${index === 0 ? "current" : ""}">
                  <strong>${escapeHtml(module.title)}</strong>
                  <span>${escapeHtml(module.range)} • ${escapeHtml(module.status)}</span>
                  <p>${escapeHtml(module.summary)}</p>
                </div>
              `).join("")}
            </div>
          </div>
        </section>
        <section class="section-card">
          <header><h3>Module 1 Focus</h3></header>
          <div class="section-body">
            <p>${escapeHtml(courseHome.currentModuleSummary)}</p>
            <div class="home-grid">
              ${courseHome.moduleMoves.map((move) => `
                <div class="module-card"><span>${escapeHtml(move)}</span></div>
              `).join("")}
            </div>
          </div>
        </section>
        <section class="section-card">
          <header><h3>How The Lessons Work</h3></header>
          <div class="section-body">
            <ol class="steps">
              <li>Start with a quick real-world problem.</li>
              <li>Watch or study the visual explanation.</li>
              <li>Practice the skill with immediate feedback.</li>
              <li>Use the exit check to see whether you are ready for the next lesson.</li>
            </ol>
          </div>
        </section>
        <section class="section-card">
          <header><h3>Week 1 Lessons</h3></header>
          <div class="section-body">
            <ol class="lesson-mini-list">
              ${state.lessons.map((lesson) => `
                <li><strong>${escapeHtml(lesson.title)}:</strong> ${escapeHtml(lesson.learningTarget)}</li>
              `).join("")}
            </ol>
          </div>
        </section>
      `;
      root.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderOverviewVideo(lesson) {
      const video = lesson?.overviewVideo || (lesson?.lessonId === "01" ? courseHome.overviewVideo : null);
      if (!video) return "";
      return `
        <section class="section-card">
          <header><h3>Start Here: ${escapeHtml(video.sectionTitle || video.title || "Overview")}</h3></header>
          <div class="section-body">
            <p>${escapeHtml(video.description || "Watch this quick overview before you start the first problem.")}</p>
            <div class="video-box">
              <strong>${escapeHtml(video.title)}</strong>
              <video class="overview-video" controls preload="metadata" poster="${escapeHtml(video.poster)}">
                <source src="${escapeHtml(video.src)}" type="video/mp4">
              </video>
              <p class="watch-for"><a href="${escapeHtml(video.src)}" target="_blank" rel="noopener">Open the overview video in a new tab</a></p>
            </div>
          </div>
        </section>
      `;
    }

    function renderLessonStandards(lesson) {
      if (!lesson.standards?.length) return "";
      return `
        <div class="standards-heading">California Common Core Math Standards</div>
        <div class="standard-strip" aria-label="Lesson standards">
          ${lesson.standards.map((standard) => `
            <span class="standard-chip"><strong>${escapeHtml(standard.code)}</strong>${escapeHtml(standard.label)}</span>
          `).join("")}
        </div>
      `;
    }

    async function renderLesson(index) {
      state.active = index;
      await hydrateSavedLessonResponses(state.lessons[index]?.lessonId || "01");
      renderList();
      const lesson = state.lessons[index];
      history.replaceState(null, "", `preview.html?lesson=${lesson.lessonId}`);
      const root = document.getElementById("lesson-root");
      root.innerHTML = `
        <section class="lesson-hero">
          <div class="lesson-kicker">Lesson ${lesson.lessonId} &bull; ${lesson.estimatedMinutes} minutes</div>
          <h2>${escapeHtml(lesson.title)}</h2>
          <p>${escapeHtml(lesson.whyItMatters)}</p>
          ${renderLessonStandards(lesson)}
          ${lesson.realWorldApplication ? `<p class="application-note"><strong>Real-world application:</strong> ${escapeHtml(lesson.realWorldApplication)}</p>` : ""}
          <div class="target"><span class="target-label">Lesson Goal</span><span>${escapeHtml(lesson.learningTarget)}</span></div>
        </section>
        ${renderOverviewVideo(lesson)}
        ${renderLessonSections(lesson)}
        ${renderNextSteps(lesson)}
      `;
      initBalanceLabs(root);
      root.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderLessonSections(lesson) {
      if (!lesson.vocabulary?.length) {
        return lesson.sections.map(renderSection).join("");
      }
      return lesson.sections.map((section, index) => {
        const rendered = renderSection(section);
        return index === 0 ? `${rendered}${renderVocabulary(lesson)}` : rendered;
      }).join("");
    }

    function renderSection(section) {
      let body = "";
      if (section.studentText) body += `<p>${escapeHtml(section.studentText)}</p>`;
      if (section.image) body += renderLessonImage(section.image);
      if (section.video) body += renderVideo(section);
      if (section.workedExample) body += renderWorkedExample(section.workedExample);
      if (section.balanceLab) body += renderBalanceLab(section.balanceLab);
      if (section.type === "teaching") body += renderInfographic(state.lessons[state.active].lessonId);
      if (section.scenario) body += `<p><strong>Scenario:</strong> ${escapeHtml(section.scenario)}</p>`;

      const questions = [
        ...(section.questions || []),
        ...(section.contextQuestions || [])
      ];
      if (questions.length) {
        body += questions
          .map((question) => renderQuestion({ ...question, sectionId: section.id, sectionType: section.type, sectionTitle: section.title }))
          .join("");
      }

      return `
        <section class="section-card">
          <header><h3>${escapeHtml(section.title)}</h3></header>
          <div class="section-body">${body}</div>
        </section>
      `;
    }

    function renderVocabulary(lesson) {
      if (!lesson.vocabulary?.length) return "";
      return `
        <details class="vocab-box" open>
          <summary>Lesson Vocabulary</summary>
          <div class="vocab-grid">
            ${lesson.vocabulary.map((item) => `
              <div class="vocab-term">
                <strong>${escapeHtml(item.term)}</strong>
                <span>${escapeHtml(item.definition)}</span>
              </div>
            `).join("")}
          </div>
        </details>
      `;
    }

    function renderLessonImage(image) {
      return `
        <figure class="lesson-image">
          <img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt || "")}">
          ${image.caption ? `<figcaption>${escapeHtml(image.caption)}</figcaption>` : ""}
        </figure>
      `;
    }

    function renderVideo(section) {

    function renderBalanceLab(lab) {
      return `
        <div class="balance-lab undo-lab" data-balance-lab='${escapeHtml(JSON.stringify(lab))}' data-step="0">
          <div class="balance-equation" aria-live="polite">${escapeHtml(lab.startEquation)}</div>

        </div>
      `;
    }

    function initBalanceLabs(root = document) {
      root.querySelectorAll(".balance-lab").forEach((labEl) => updateBalanceLab(labEl));
    }

    function currentBalanceState(lab, stepIndex) {
      if (Array.isArray(lab.states) && lab.states.length) {
        return lab.states[Math.min(stepIndex, lab.states.length - 1)];
      }
      if (stepIndex <= 0) {
        return {
          equation: lab.startEquation,
          tokens: [
            { text: "3x", action: "" },
            { text: "+2", action: "" },
            { text: "=", action: "" },
            { text: "11", action: "" }
          ],
          actions: [
            { text: "-2", action: "subtract", state: "choice" },
            { text: "+2", action: "add", state: "choice" },
            { text: "÷2", action: "divide2", state: "choice" },
            { text: "×2", action: "multiply2", state: "choice" },
            { text: "÷3", action: "divide", state: "choice" }
          ],
          dropText: "Choose the first inverse operation needed.",
          feedback: "Look at the equation and choose the operation that should happen first."
        };
      }
      if (stepIndex === 1) {
        return {
          equation: "3x = 9",
          tokens: [
            { text: "3", action: "divide" },
            { text: "x", action: "" },
            { text: "=", action: "" },
            { text: "9", action: "" }
          ],
          actions: [
            { text: "-2", action: "subtract", state: "done" },
            { text: "-3", action: "subtract3", state: "choice" },
            { text: "+3", action: "add3", state: "choice" },
            { text: "÷3", action: "divide", state: "choice" },
            { text: "×3", action: "multiply3", state: "choice" }
          ],
          dropText: "Choose the next inverse operation needed.",
          feedback: lab.steps[0].explanation
        };
      }
      return {
        equation: "x = 3",
        tokens: [
          { text: "x", action: "" },
          { text: "=", action: "" },
          { text: "3", action: "" }
        ],
        actions: [
          { text: "-2", action: "subtract", state: "done" },
          { text: "÷3", action: "divide", state: "done" }
        ],
        dropText: "Solved",
        feedback: lab.complete
      };
    }

    function updateBalanceLab(labEl) {
      const lab = JSON.parse(labEl.dataset.balanceLab);
      const stepIndex = Number(labEl.dataset.step || 0);
      const state = currentBalanceState(lab, stepIndex);
      labEl.querySelector(".balance-equation").textContent = state.equation;
      labEl.querySelector(".undo-board").innerHTML = state.tokens.map((token) => {
        const item = typeof token === "string" ? { text: token } : token;
        return `
          <span class="undo-token ${item.action ? "draggable" : ""}" ${item.action ? `draggable="true" data-undo-action="${escapeHtml(item.action)}"` : ""}>
            ${escapeHtml(item.text)}
          </span>
        `;
      }).join("");
      labEl.querySelector(".operation-bank").innerHTML = `
        <strong>Choose the next move:</strong>
        ${state.actions.map((action) => `
          <span class="operation-tile ${action.state === "done" ? "done" : "draggable"}" ${action.state === "done" ? "" : `draggable="true" data-undo-action="${escapeHtml(action.action)}"`}>
            ${escapeHtml(action.text)}
          </span>
        `).join("")}
      `;
      labEl.querySelector(".undo-drop-zone").textContent = state.dropText;
      labEl.querySelector(".balance-feedback").textContent = state.feedback;
    }

    function applyBalanceMove(labEl, action) {
      const lab = JSON.parse(labEl.dataset.balanceLab);
      const stepIndex = Number(labEl.dataset.step || 0);
      const feedback = labEl.querySelector(".balance-feedback");
      if (Array.isArray(lab.states) && lab.states.length) {
        const current = lab.states[Math.min(stepIndex, lab.states.length - 1)];
        if (!current.expectedAction) {
          feedback.textContent = lab.complete || current.feedback || "Solved.";
          return;
        }
        if (action !== current.expectedAction) {
          feedback.textContent = current.wrongFeedback || "Not quite. Choose the operation that keeps the equation balanced.";
          return;
        }
        labEl.dataset.step = String(stepIndex + 1);
        updateBalanceLab(labEl);
        return;
      }
      if (stepIndex >= lab.steps.length) {
        feedback.textContent = lab.complete;
        return;
      }
      const expectedAction = stepIndex === 0 ? "subtract" : "divide";
      if (action !== expectedAction) {
        feedback.textContent = stepIndex === 0
          ? "Not quite. Look for the operation that undoes the constant term on the left."
          : "Not quite. The variable is being multiplied by a coefficient. Which operation undoes multiplication?";
        return;
      }
      labEl.dataset.step = String(stepIndex + 1);
      updateBalanceLab(labEl);
    }

    function isExitCheckQuestion(question) {

    function localSavedResponses(lessonId) {
      const key = "caasppMathPilotSubmissions";
      const existing = JSON.parse(localStorage.getItem(key) || "{}");
      return existing?.["pilot-student"]?.lessons?.[lessonId]?.responses || {};

    function responseFromRemoteRow(row) {
      return {
        questionId: row.question_id,
        sectionId: row.section_id || "",
        sectionTitle: row.section_title || "",
        prompt: row.prompt || "",
        type: row.question_type || "",
        grading: row.grading_method || "",
        answer: row.answer || "",
        score: Number(row.score || 0),
        maxScore: Number(row.max_score || 0),
        feedback: row.feedback || "",
        correct: Number(row.max_score || 0) ? Number(row.score || 0) >= Number(row.max_score || 0) * 0.7 : true,
        confidence: Number(row.ai_confidence ?? 1),
        needsTeacherReview: Boolean(row.needs_teacher_review),
        updatedAt: row.updated_at || ""
      };
    }

    async function hydrateSavedLessonResponses(lessonId) {
      state.savedResponses = { ...localSavedResponses(lessonId) };
      if (!window.CourseData || !state.profile || state.profile.role !== "student") return;

      const session = await CourseData.getSession().catch(() => null);
      if (!session?.user?.id) return;
      const rows = await CourseData.loadStudentResponses(session.user.id, Number(lessonId)).catch(() => null);
      if (!Array.isArray(rows)) return;
      state.savedResponses = rows.reduce((map, row) => {
        map[row.question_id] = responseFromRemoteRow(row);
        return map;
      }, state.savedResponses);
    }

    function exitQuestionNeedsReview(question, result) {
      if (!isExitCheckQuestion(question)) return Boolean(result.needsTeacherReview);
      const maxScore = Number(result.maxScore || 0);
      const score = Number(result.score || 0);
      if (!maxScore) return Boolean(result.needsTeacherReview);
      return Boolean(result.needsTeacherReview) || (score / maxScore) < 0.7;
    }

    function getSavedQuestionResponse(questionId) {
      const lessonId = state.lessons[state.active]?.lessonId || "01";
      return state.savedResponses[questionId] || localSavedResponses(lessonId)?.[questionId] || null;
    }

    function lockExitQuestion(card, result) {
      if (!card) return;
      card.classList.add("locked");
      card.querySelectorAll("input, textarea").forEach((input) => {
        input.disabled = true;
      });
      const button = card.querySelector("button.check");
      if (button) {
        button.disabled = true;
        button.textContent = "Exit Check Submitted";
      }
      if (result) {
        const feedback = card.querySelector(".feedback");
        feedback.className = `feedback ${result.correct ? "correct" : "review"} show`;
        feedback.textContent = `${result.score}/${result.maxScore}: ${result.feedback}`;
      }
    }

    function renderQuestion(question) {
      const id = escapeHtml(question.id);
      const savedResponse = getSavedQuestionResponse(question.id);
      const isLocked = isExitCheckQuestion(question) && savedResponse;
      const disabled = isLocked ? " disabled" : "";
      let input = "";
      if (question.options) {
        input = question.options.map(option => `
          <label class="option">
            <input type="radio" name="${id}" value="${escapeHtml(option.value)}"${savedResponse && String(savedResponse.answer) === String(option.value) ? " checked" : ""}${disabled}>
            <strong>${escapeHtml(option.value)}.</strong> ${escapeHtml(option.text)}
          </label>
        `).join("");
      } else if (question.type === "numeric") {
        input = `<input type="number" data-answer="${escapeHtml(question.answer)}" aria-label="${id} answer" value="${escapeHtml(savedResponse?.answer || "")}"${disabled}>`;
      } else if (question.type === "table_fill") {
        input = `<input type="text" aria-label="${id} answer" placeholder="Example: 4, 7, 10" value="${escapeHtml(savedResponse?.answer || "")}"${disabled}>`;
      } else {
        input = `<textarea aria-label="${id} answer" placeholder="Write your thinking here."${disabled}>${escapeHtml(savedResponse?.answer || "")}</textarea>`;
      }

      const reviewText = question.grading === "ai_rubric"
        ? escapeHtml(question.feedback || "Write a complete answer that explains your reasoning.")
        : escapeHtml(question.feedback || "Answer submitted.");
      const savedFeedback = savedResponse
        ? `<div class="feedback ${feedbackClassForResult(question, savedResponse)} show" data-review="${escapeHtml(reviewText)}">${escapeHtml(`${savedResponse.score}/${savedResponse.maxScore}: ${savedResponse.feedback}`)}</div>`
        : `<div class="feedback" data-review="${escapeHtml(reviewText)}"></div>`;
      const buttonText = isLocked
        ? "Exit Check Submitted"
        : savedResponse
          ? "Update Answer"
          : isExitCheckQuestion(question) ? "Submit Exit Question" : "Submit Answer";

      return `
        <div class="question ${isLocked ? "locked" : ""}" data-question='${escapeHtml(JSON.stringify(question))}'>
          <p>${question.promptHtml || escapeHtml(question.prompt)}</p>
          ${input}
          <div class="actions"><button class="check" type="button"${disabled}>${escapeHtml(buttonText)}</button></div>
          ${savedFeedback}
        </div>
      `;
    }

    function feedbackClassForResult(question, result) {

    document.addEventListener("click", (event) => {
      if (event.target.matches(".operation-tile.draggable")) {
        const labEl = event.target.closest(".balance-lab");
        applyBalanceMove(labEl, event.target.dataset.undoAction);
        return;
      }

      const videoPoster = event.target.closest(".video-poster");
      if (videoPoster) {
        activateVideoPoster(videoPoster);
        return;
      }

      if (event.target.matches("button.submit-lesson")) {
        submitLesson();
        return;
      }

      if (!event.target.matches("button.check")) return;
      const card = event.target.closest(".question");
      const question = JSON.parse(card.dataset.question);
      const feedback = card.querySelector(".feedback");

      if (question.grading === "ai_rubric") {
        const textInput = card.querySelector("textarea, input[type='text']");
        const answer = textInput ? textInput.value.trim() : "";
        if (!answer) {
          feedback.className = "feedback review show";
          feedback.textContent = "Write your reasoning first, then check it.";
          return;
        }

        feedback.className = "feedback review show";
        feedback.textContent = "Checking with AI feedback...";
        gradeWithAi(question, answer)
          .then((result) => {
            const savedResult = {
              score: result.score,
              maxScore: result.maxScore,
              feedback: result.feedback,
              correct: result.correct,
              confidence: result.confidence,
              needsTeacherReview: exitQuestionNeedsReview(question, result)
            };
            feedback.className = `feedback ${result.correct ? "correct" : "review"} show`;
            feedback.textContent = `${result.score}/${result.maxScore}: ${result.feedback}`;
            savePilotSubmission(question, answer, {
              ...savedResult
            });
            if (isExitCheckQuestion(question)) lockExitQuestion(card, savedResult);
            else updateRetryButton(card, question, savedResult);
          })
          .catch(() => {
            const savedResult = {
              score: 0,
              maxScore: Number(question.maxPoints || 3),
              feedback: "AI feedback could not run from this link right now. Your answer is saved for teacher review.",
              correct: false,
              confidence: 0,
              needsTeacherReview: true
            };
            feedback.className = "feedback review show";
            feedback.textContent = savedResult.feedback;
            savePilotSubmission(question, answer, savedResult);
            if (isExitCheckQuestion(question)) lockExitQuestion(card, savedResult);
            else updateRetryButton(card, question, savedResult);
          });
        return;
      }

      let answer = "";
      const checked = card.querySelector("input[type='radio']:checked");
      const textInput = card.querySelector("input[type='number'], input[type='text'], textarea");
      if (checked) answer = checked.value;
      if (textInput) answer = textInput.value.trim();

      const expected = Array.isArray(question.answer) ? question.answer.join(", ") : String(question.answer ?? "");
      const correct = isDeterministicAnswerCorrect(question, answer);
      const isPractice = question.sectionType === "practice";
      feedback.className = `feedback ${correct ? "correct" : "incorrect"} show`;
      feedback.textContent = correct
        ? question.feedback
        : isPractice
          ? practiceRetryFeedback(question)
          : `Check this answer: ${expected}. ${question.feedback || ""}`;
      const savedResult = {
        score: correct ? 1 : 0,
        maxScore: 1,
        feedback: feedback.textContent,
        correct,
        confidence: 1,
        needsTeacherReview: isExitCheckQuestion(question) && !correct
      };
      savePilotSubmission(question, answer, savedResult);
      if (isExitCheckQuestion(question)) lockExitQuestion(card, savedResult);
      else updateRetryButton(card, question, savedResult);
    });

    function practiceRetryFeedback(question) {
      const hints = {
        "l1-p1": "Not yet. Undo +14 by subtracting 14 from both sides, then check your value.",
        "l1-p2": "Not yet. Undo the -6 first, then divide by the coefficient of x.",
        "l1-p3": "Not yet. Look closely at what should happen to +9 when you move it away from 2x."
      };
      return hints[question.id] || "Not yet. Use the worked example, revise your answer, and check again.";
    }

    function normalizeMathText(value) {
      return String(value ?? "")
        .toLowerCase()
        .replace(/[.,;:!?()[\]{}]/g, " ")
        .replace(/\b(one|two|three|four|five|six|seven|eight|nine|ten)\b/g, (match) => ({
          one: "1",
          two: "2",
          three: "3",
          four: "4",
          five: "5",
          six: "6",
          seven: "7",
          eight: "8",
          nine: "9",
          ten: "10"
        })[match])
        .replace(/\s+/g, " ")
        .trim();
    }

    function isDeterministicAnswerCorrect(question, answer) {
      if (question.options) return String(answer).toLowerCase() === String(question.answer).toLowerCase();
      if (question.type === "numeric") return Number(answer) === Number(question.answer);

      const normalizedAnswer = normalizeMathText(answer);
      const normalizedExpected = normalizeMathText(question.answer);

      if (question.id === "l1-vq1") {
        const mentionsFive = /\b5\b/.test(normalizedAnswer);
        const mentionsX = /\bx\b/.test(normalizedAnswer);
        const meansMultiply = /(times|multipl|product|groups of|value of x|whatever.*x|x.*value)/.test(normalizedAnswer);
        return mentionsFive && mentionsX && meansMultiply;
      }

      if (question.id === "l1-vq3") {
        const compact = normalizedAnswer.replace(/\s+/g, "");
        return compact.includes("-5/6") || compact.includes("negative5/6") || compact.includes("minus5/6");
      }

      return normalizedAnswer === normalizedExpected;
    }

    function isTeacherPreview() {
      return ["admin", "staff", "teacher"].includes(state.profile?.role);
    }

    function canSaveStudentWork() {
      return !isTeacherPreview();
    }

    function savePilotSubmission(question, answer, result) {
      if (!canSaveStudentWork()) return;
      const key = "caasppMathPilotSubmissions";
      const now = new Date().toISOString();
      const existing = JSON.parse(localStorage.getItem(key) || "{}");
      const studentId = "pilot-student";
      const lessonId = state.lessons[state.active]?.lessonId || "01";
      existing[studentId] = existing[studentId] || { studentId, studentName: "Test Student", lessons: {} };
      existing[studentId].lessons[lessonId] = existing[studentId].lessons[lessonId] || { lessonId, responses: {}, updatedAt: now };
      const savedResponse = {
        questionId: question.id,
        sectionId: question.sectionId || "",
        sectionTitle: question.sectionTitle || "",
        prompt: question.prompt,
        type: question.type,
        grading: question.grading,
        answer,
        score: Number(result.score) || 0,
        maxScore: Number.isFinite(Number(result.maxScore)) ? Number(result.maxScore) : 1,
        feedback: result.feedback || "",
        correct: Boolean(result.correct),
        confidence: Number(result.confidence ?? 1),
        needsTeacherReview: Boolean(result.needsTeacherReview),
        updatedAt: now
      };
      existing[studentId].lessons[lessonId].responses[question.id] = savedResponse;
      state.savedResponses[question.id] = savedResponse;
      existing[studentId].lessons[lessonId].updatedAt = now;
      localStorage.setItem(key, JSON.stringify(existing));
      ensurePilotAccount();
      if (window.CourseData) {
        window.CourseData.saveQuestionResponse({
          lessonId,
          question,
          answer,
          result
        }).catch(() => {});
      }
    }

    async function submitLesson() {
      const lesson = state.lessons[state.active];
      const status = document.getElementById("submit-status");
      const button = document.querySelector("button.submit-lesson");
      const answer = document.getElementById("finish-challenge-answer")?.value.trim() || "";

      if (!lesson || !status || !button) return;
      button.disabled = true;
      status.className = "submit-status show";
      status.style.color = "#24476b";
      status.textContent = isTeacherPreview() ? "Preview checked. Nothing was saved to the gradebook." : "Saving your lesson...";

      const studentId = "pilot-student";
      const lessonId = lesson.lessonId || "01";
      if (canSaveStudentWork()) {
        if (answer) {
          const challengeQuestion = {
            id: `l${lesson.lessonId}-finish-challenge`,
            type: "short_answer",
            prompt: lessonNextSteps(lesson).challenge,
            grading: "teacher_override",
            sectionId: "finish_line",
            sectionTitle: "Finish Line"
          };

          savePilotSubmission(challengeQuestion, answer, {
            score: 0,
            maxScore: 0,
            feedback: "Submitted for teacher review.",
            correct: true,
            confidence: 1,
            needsTeacherReview: true
          });
        }

        const key = "caasppMathPilotSubmissions";
        const existing = JSON.parse(localStorage.getItem(key) || "{}");
        existing[studentId] = existing[studentId] || { studentId, studentName: "Test Student", lessons: {} };
        existing[studentId].lessons[lessonId] = existing[studentId].lessons[lessonId] || { lessonId, responses: {} };
        existing[studentId].lessons[lessonId].status = "submitted";
        existing[studentId].lessons[lessonId].submittedAt = new Date().toISOString();
        localStorage.setItem(key, JSON.stringify(existing));

        if (window.CourseData) {
          await window.CourseData.submitLessonAttempt(lessonId).catch(() => null);
        }
      }

      status.style.color = "var(--green)";
      status.textContent = isTeacherPreview()
        ? "Preview complete. Teacher clicks were not saved."
        : "Lesson submitted. Your teacher can now review your work sample.";
      button.textContent = isTeacherPreview() ? "Preview Complete" : "Submitted";
    }

    function ensurePilotAccount() {
      const key = "caasppMathPilotAccounts";
      const accounts = JSON.parse(localStorage.getItem(key) || "[]");
      if (!accounts.some((account) => account.id === "pilot-student")) {
        accounts.push({ id: "pilot-student", role: "student", name: "Test Student", login: "test.student", createdAt: new Date().toISOString() });
        localStorage.setItem(key, JSON.stringify(accounts));
      }
    }

    function currentLessonContext() {
      const lesson = state.lessons[state.active];
      if (!lesson) {
        return {
          course: "CAASPP Math Success Academy",
          module: courseHome.currentModule,
          lessonTitle: "Course Overview",
          learningTarget: "Understand the goals for Module 1.",
          visibleSections: [
            {
              title: "Big Picture For Week 1",
              studentText: courseHome.currentModuleSummary,
              moves: courseHome.moduleMoves
            }
          ]
        };
      }

      return {
        course: "CAASPP Math Success Academy",
        module: lesson.module,
        lessonId: lesson.lessonId,
        lessonTitle: lesson.title,
        learningTarget: lesson.learningTarget,
        whyItMatters: lesson.whyItMatters,
        visibleSections: lesson.sections.map((section) => ({
          id: section.id,
          title: section.title,
          type: section.type,
          studentText: section.studentText || "",
          watchFor: section.watchFor || "",
          workedExample: section.workedExample || null,
          scenario: section.scenario || "",
          commonMistake: section.workedExample?.commonMistake || ""
        })),
        allowedHelp: [
          "explain the current concept",
          "ask one guiding question",
          "make a similar practice problem",
          "give feedback on student reasoning"
        ],
        blockedHelp: [
          "reveal final answers for active graded checks",
          "write the student's constructed response"
        ]
      };
    }

    async function askStudyBuddy(studentMessage) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [{ role: "user", content: studentMessage }],
          lessonContext: currentLessonContext()
        })
      });
      if (!response.ok) throw new Error("Study Buddy unavailable");
      const data = await response.json();
      return data.reply || "Try asking that another way.";
    }

    async function gradeWithAi(question, studentAnswer) {
      const response = await fetch("/api/grade", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          questionText: question.prompt,
          studentAnswer,
          rubricId: question.rubricId,
          lessonContext: currentLessonContext(),
          maxPoints: question.maxPoints || 3
        })
      });
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || "AI grading unavailable");
      }
      return response.json();
    }

    const StudyBuddy = {
      history: [],
      isOpen: false,
      isLoading: false,

      init() {
        this.btn = document.querySelector(".study-buddy-btn");
        this.panel = document.querySelector(".study-buddy-panel");
        this.messagesEl = document.querySelector(".sb-messages");
        this.inputEl = document.querySelector(".sb-input");
        this.btn.addEventListener("click", () => this.toggle());
        document.querySelector(".sb-close").addEventListener("click", () => this.toggle());
        document.querySelector(".sb-send").addEventListener("click", () => this.handleSend());
        this.inputEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            this.handleSend();
          }
        });
        this.showWelcome();
      },

      toggle() {
        this.isOpen = !this.isOpen;
        this.panel.classList.toggle("open", this.isOpen);
        this.btn.classList.toggle("active", this.isOpen);
        if (this.isOpen) {
          this.inputEl.focus();
          this.scrollToBottom();
        }
      },

      showWelcome() {
        this.addBotMessage("Hi! I'm your CAASPP Math Study Buddy. Ask me to explain a step, check your reasoning, or make a similar practice problem.");
        const suggestions = document.createElement("div");
        suggestions.className = "sb-suggestions";
        [
          "Help me start Lesson 1",
          "Quiz me on inverse operations",
          "What does coefficient mean?"
        ].forEach((text) => {
          const chip = document.createElement("button");
          chip.className = "sb-suggestion";
          chip.type = "button";
          chip.textContent = text;
          chip.addEventListener("click", () => {
            suggestions.remove();
            this.sendMessage(text);
          });
          suggestions.appendChild(chip);
        });
        this.messagesEl.appendChild(suggestions);
      },

      formatMarkdown(text) {
        let html = escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        return html.split("\n").map((line) => line.trim() ? `<p>${line}</p>` : "<br>").join("");
      },

      addBotMessage(text) {
        const message = document.createElement("div");
        message.className = "sb-msg sb-msg-bot";
        message.innerHTML = this.formatMarkdown(text);
        this.messagesEl.appendChild(message);
        this.scrollToBottom();
      },

      addUserMessage(text) {
        const message = document.createElement("div");
        message.className = "sb-msg sb-msg-user";
        message.textContent = text;
        this.messagesEl.appendChild(message);
        this.scrollToBottom();
      },

      showTyping() {
        const typing = document.createElement("div");
        typing.className = "sb-msg sb-msg-bot sb-typing";
        typing.id = "sb-typing";
        typing.innerHTML = "<span></span><span></span><span></span>";
        this.messagesEl.appendChild(typing);
        this.scrollToBottom();
      },

      hideTyping() {
        const typing = document.getElementById("sb-typing");
        if (typing) typing.remove();
      },

      scrollToBottom() {
        requestAnimationFrame(() => {
          this.messagesEl.scrollTop = this.messagesEl.scrollHeight;
        });
      },

      handleSend() {
        const text = this.inputEl.value.trim();
        if (!text || this.isLoading) return;
        this.inputEl.value = "";
        this.sendMessage(text);
      },

      async sendMessage(text) {
        const suggestions = this.messagesEl.querySelector(".sb-suggestions");
        if (suggestions) suggestions.remove();

        this.addUserMessage(text);
        this.history.push({ role: "user", content: text });
        this.isLoading = true;
        this.inputEl.disabled = true;
        this.showTyping();

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              messages: this.history,
              lessonContext: currentLessonContext()
            })
          });
          const data = await response.json();
          this.hideTyping();
          if (response.ok && data.reply) {
            this.history.push({ role: "assistant", content: data.reply });
            this.addBotMessage(data.reply);
          } else {
            this.addBotMessage(data.error || "I couldn't answer that right now. Try again in a moment.");
          }
        } catch {
          this.hideTyping();
          this.addBotMessage("I couldn't connect right now. Try again in a moment.");
        } finally {
          this.isLoading = false;
          this.inputEl.disabled = false;
          this.inputEl.focus();
        }

        if (this.history.length > 20) {
          this.history = this.history.slice(-20);
        }
      }
    };

    async function setupCourseNav() {
      const nav = document.getElementById("course-nav");
      const profile = window.CAASPPAuth ? await CAASPPAuth.getProfile() : null;
      state.profile = profile;
      if (!profile) return;
      const displayName = profile.full_name || profile.username || profile.email || "";
      if (profile.role === "student") {
        nav.innerHTML = `
          <a class="nav-primary" href="student-dashboard.html">Dashboard</a>
          <span class="nav-user-name">${escapeHtml(displayName)}</span>
          <button id="preview-sign-out" type="button">Sign Out</button>
        `;
      } else {
        nav.innerHTML = `
          <a class="nav-primary" href="teacher-dashboard.html">Gradebook</a>
          <a href="teacher-guide.html">Teacher Guide</a>
          <a href="preview.html">Course Overview</a>
          <span class="nav-user-name">${escapeHtml(displayName)}</span>
          <button id="preview-sign-out" type="button">Sign Out</button>
        `;
      }
      nav.classList.add("visible");
      document.getElementById("preview-sign-out")?.addEventListener("click", () => {
        if (window.CAASPPAuth) CAASPPAuth.signOut();
        else window.location.href = "index.html";
      });
    }

    async function initCourse() {
      await setupCourseNav();
      await loadLessons();
    }

    initCourse().catch((error) => {
      document.getElementById("lesson-root").innerHTML = `
        <section class="section-card"><div class="section-body">
          <strong>Preview failed to load.</strong>
          <p>${escapeHtml(error.message)}</p>
          <p>Open this through a local web server so the lesson JSON files can load.</p>
        </div></section>
      `;
    });
    StudyBuddy.init();
  </script>
