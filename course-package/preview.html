<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAASPP Math Success Academy - Week 1 Preview</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #5d6b7a;
      --line: #d9e1e8;
      --soft: #f5f8fb;
      --panel: #ffffff;
      --blue: #2457a6;
      --teal: #0f766e;
      --gold: #b7791f;
      --red: #b42318;
      --green: #0f7a3f;
      --shadow: 0 10px 28px rgba(23, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: #eef3f7;
      line-height: 1.5;
    }

    .course-header {
      background: #0f263f;
      color: #fff;
      padding: 22px clamp(16px, 4vw, 44px);
      border-bottom: 5px solid #f2b84b;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-logo {
      width: 150px;
      max-width: 42vw;
      height: auto;
      background: #fff;
      border-radius: 6px;
      padding: 8px;
    }

    .course-header h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.1rem);
      letter-spacing: 0;
    }

    .course-header p {
      margin: 6px 0 0;
      max-width: 920px;
      color: #d7e3ef;
      font-size: 0.98rem;
    }

    .header-shell {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .teacher-nav {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .teacher-nav.visible {
      display: flex;
    }

    .teacher-nav a,
    .teacher-nav button {
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 6px;
      padding: 8px 11px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .teacher-nav a:hover,
    .teacher-nav button:hover {
      background: rgba(255,255,255,0.18);
    }

    .shell {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 22px;
      padding: 22px clamp(14px, 3vw, 36px) 36px;
      max-width: 1400px;
      margin: 0 auto;
    }

    aside {
      position: sticky;
      top: 16px;
      align-self: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .side-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #123354;
      color: #fff;
    }

    .side-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .side-head p {
      margin: 6px 0 0;
      color: #d7e3ef;
      font-size: 0.86rem;
    }

    .home-button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff8e6;
      text-align: left;
      padding: 13px 16px;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
    }

    .home-button:hover,
    .home-button.active {
      background: #fce7b2;
    }

    .home-button strong {
      display: block;
      color: #6d4a00;
      font-size: 0.95rem;
    }

    .home-button span {
      display: block;
      color: #654f1d;
      font-size: 0.78rem;
      margin-top: 2px;
    }

    .lesson-list {
      display: grid;
      gap: 0;
    }

    .lesson-button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: left;
      padding: 13px 16px;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
    }

    .lesson-button:hover,
    .lesson-button.active {
      background: #edf6ff;
    }

    .lesson-button.active {
      border-left: 5px solid var(--blue);
      padding-left: 11px;
    }

    .lesson-button strong {
      display: block;
      font-size: 0.95rem;
    }

    .lesson-button span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2px;
    }

    main {
      min-width: 0;
    }

    .notice {
      background: #fff8e6;
      border: 1px solid #f3d48a;
      border-left: 5px solid var(--gold);
      border-radius: 8px;
      padding: 13px 15px;
      margin-bottom: 18px;
      color: #4d390d;
    }

    .lesson-hero,
    .section-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .lesson-hero {
      padding: clamp(18px, 4vw, 28px);
    }

    .lesson-kicker {
      color: var(--teal);
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .home-grid,
    .module-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .module-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #fbfcfd;
    }

    .module-card.current {
      border-left: 5px solid var(--blue);
      background: #edf6ff;
    }

    .module-card strong {
      display: block;
      margin-bottom: 4px;
    }

    .module-card span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .lesson-mini-list {
      margin: 10px 0 0;
      padding-left: 20px;
    }

    .lesson-hero h2 {
      margin: 4px 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.55rem);
      letter-spacing: 0;
    }

    .target {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #e9f3ff;
      color: #153d72;
      font-weight: 650;
    }

    .section-card header {
      background: var(--soft);
      color: var(--ink);
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
    }

    .section-card header h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .section-body {
      padding: 16px 18px 18px;
    }

    .video-box {
      border: 1px dashed #aac0d6;
      background: #f7fbff;
      border-radius: 8px;
      padding: 14px;
      margin: 10px 0 14px;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f263f;
      margin: 10px 0;
    }

    .overview-video {
      display: block;
      width: 100%;
      max-height: 520px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f263f;
    }

    .vocab-box {
      border: 1px solid #bfd3e8;
      border-left: 5px solid var(--teal);
      border-radius: 8px;
      background: #f6fbff;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .vocab-box summary {
      cursor: pointer;
      padding: 14px 18px;
      font-weight: 800;
      color: #102a44;
      list-style-position: inside;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 0 18px 18px;
    }

    .vocab-term {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .vocab-term strong {
      display: block;
      color: #153d72;
      margin-bottom: 3px;
    }

    .vocab-term span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .math-expression {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      vertical-align: middle;
    }

    .math-negative {
      font-weight: 800;
      margin-right: 1px;
    }

    .fraction {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      min-width: 1.15em;
      margin: 0 1px;
      vertical-align: middle;
      font-variant-numeric: lining-nums tabular-nums;
    }

    .fraction span:first-child {
      border-bottom: 2px solid currentColor;
      line-height: 1;
      width: 100%;
      text-align: center;
      padding: 0 2px 2px;
    }

    .fraction span:last-child {
      line-height: 1;
      padding-top: 2px;
    }

    .video-box a {
      color: var(--blue);
      font-weight: 700;
    }

    .watch-for {
      margin: 10px 0 0;
      color: #24476b;
    }

    .lesson-image {
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f7fbff;
    }

    .lesson-image img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .lesson-image figcaption {
      padding: 9px 12px;
      color: #24476b;
      font-size: 0.9rem;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      margin-top: 12px;
      background: #fff;
    }

    .question p {
      margin: 0 0 10px;
      font-weight: 650;
    }

    .option {
      display: block;
      margin: 7px 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 1px solid #b9c7d5;
      border-radius: 6px;
      padding: 10px;
      font: inherit;
      min-height: 42px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .feedback {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      font-size: 0.92rem;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.correct { background: #e8f7ee; color: var(--green); }
    .feedback.review { background: #fff8e6; color: #6c4a00; }
    .feedback.incorrect { background: #fff0ee; color: var(--red); }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button.check {
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button.check:hover { background: #1c4585; }

    button.secondary {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary:hover { background: var(--soft); }

    .steps {
      margin: 10px 0;
      padding-left: 22px;
    }

    .common-mistake {
      border-left: 4px solid var(--gold);
      background: #fff8e6;
      padding: 10px 12px;
      border-radius: 6px;
      color: #503b0b;
    }

    .infographic {
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .infographic img {
      display: block;
      width: 100%;
      height: auto;
    }

    .gate {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .gate div {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfd;
    }

    .gate strong {
      display: block;
      color: var(--teal);
      margin-bottom: 3px;
    }

    .challenge-box {
      margin-top: 12px;
    }

    .study-buddy-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      border: 0;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(23, 32, 42, 0.22);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }

    .study-buddy-btn:hover {
      background: #9a6216;
      transform: scale(1.05);
    }

    .study-buddy-btn.active {
      background: #4b5563;
    }

    .study-buddy-panel {
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 370px;
      height: 520px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 36px rgba(23, 32, 42, 0.2);
      z-index: 40;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      pointer-events: none;
      transition: opacity 0.22s, transform 0.22s;
    }

    .study-buddy-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .sb-header {
      background: #123354;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sb-title {
      font-weight: 700;
    }

    .sb-close {
      background: none;
      border: 0;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .sb-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f5f8fb;
    }

    .sb-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.45;
      word-wrap: break-word;
    }

    .sb-msg-bot {
      background: #fff;
      color: var(--ink);
      align-self: flex-start;
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }

    .sb-msg-bot p {
      margin: 0 0 6px;
    }

    .sb-msg-bot p:last-child {
      margin-bottom: 0;
    }

    .sb-msg-user {
      background: var(--blue);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .sb-typing {
      display: flex;
      gap: 4px;
      padding: 12px 18px;
    }

    .sb-typing span {
      width: 8px;
      height: 8px;
      background: #9aa8b6;
      border-radius: 50%;
      animation: sb-bounce 1.2s infinite;
    }

    .sb-typing span:nth-child(2) { animation-delay: 0.15s; }
    .sb-typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes sb-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .sb-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sb-suggestion {
      background: #fff;
      border: 1px solid var(--gold);
      color: #6d4a00;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .sb-suggestion:hover {
      background: #fff8e6;
    }

    .sb-input-area {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: #fff;
      flex-shrink: 0;
    }

    .sb-input {
      flex: 1;
      border: 1px solid #b9c7d5;
      border-radius: 999px;
      padding: 8px 14px;
      font: inherit;
      outline: none;
    }

    .sb-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 0;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    @media (max-width: 860px) {
      .course-header {
        position: static;
      }

      .teacher-nav {
        width: 100%;
        justify-content: stretch;
      }

      .teacher-nav a,
      .teacher-nav button {
        flex: 1 1 auto;
        text-align: center;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }

      .gate {
        grid-template-columns: 1fr;
      }

      .home-grid,
      .module-grid {
        grid-template-columns: 1fr;
      }

      .vocab-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .study-buddy-panel {
        width: calc(100% - 16px);
        height: calc(100% - 120px);
        right: 8px;
        bottom: 88px;
      }

      .study-buddy-btn {
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="course-header">
    <div class="header-shell">
      <div class="brand-row">
        <img class="brand-logo" src="assets/altus-logo.png" alt="Altus Schools">
        <div>
          <h1>CAASPP Math Success Academy</h1>
          <p>Week 1 preview: equations, inequalities, linear functions, slope/intercepts, and function notation.</p>
        </div>
      </div>
      <nav id="course-nav" class="teacher-nav" aria-label="Course navigation">
        <a href="teacher-dashboard.html">Gradebook</a>
        <a href="teacher-guide.html">Teacher Guide</a>
        <a href="preview.html">Course Home</a>
        <button id="preview-sign-out" type="button">Sign Out</button>
      </nav>
    </div>
  </header>

  <div class="shell">
    <aside>
      <div class="side-head">
        <h2>Module 1: Linear Foundations</h2>
        <p>Five daily lessons that move from solving equations to using linear models in context.</p>
      </div>
      <button id="home-button" class="home-button" type="button">
        <strong>Course Home</strong>
        <span>See the big picture before opening a lesson.</span>
      </button>
      <div id="lesson-list" class="lesson-list"></div>
    </aside>

    <main>
      <div id="lesson-root"></div>
    </main>
  </div>

  <button class="study-buddy-btn" type="button" aria-label="Open Study Buddy">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
  <div class="study-buddy-panel" aria-live="polite">
    <div class="sb-header">
      <span class="sb-title">Study Buddy</span>
      <button class="sb-close" type="button" aria-label="Close Study Buddy">&times;</button>
    </div>
    <div class="sb-messages"></div>
    <div class="sb-input-area">
      <input type="text" class="sb-input" placeholder="Ask about this lesson..." maxlength="500">
      <button class="sb-send" type="button" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shared-course-data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const lessonIds = ["01", "02", "03", "04", "05"];
    const courseHome = {
      title: "CAASPP Math Success Academy",
      subtitle: "Build confidence with the math moves that show up again and again on CAASPP.",
      currentModule: "Module 1: Linear Foundations",
      currentModuleSummary: "This module starts with equations, then moves into inequalities, tables, graphs, slope, intercepts, and function notation. The goal is to see the same linear relationship in different forms and explain what it means.",
      overviewVideo: {
        title: "Lesson 1 Overview: Deconstructing the Equation",
        src: "media/videos/module-01-overview-deconstructing-the-equation-web.mp4",
        poster: "media/videos/module-01-overview-deconstructing-the-equation-poster.png"
      },
      moduleMoves: [
        "Undo equations while keeping both sides balanced.",
        "Read inequalities as ranges of possible values.",
        "Connect a situation to a table, graph, and equation.",
        "Explain slope, intercepts, and function notation in context."
      ]
    };
    const state = { lessons: [], active: null };

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    async function loadLessons() {
      const loaded = [];
      for (const id of lessonIds) {
        const response = await fetch(`lessons/lesson-${id}.json`);
        loaded.push(await response.json());
      }
      state.lessons = loaded;
      renderList();
      renderInitialRoute();
    }

    function renderInitialRoute() {
      const params = new URLSearchParams(window.location.search);
      const lessonParam = params.get("lesson");
      if (lessonParam) {
        const index = state.lessons.findIndex((lesson) => lesson.lessonId === lessonParam.padStart(2, "0"));
        if (index >= 0) {
          renderLesson(index);
          return;
        }
      }
      renderHome();
    }

    function renderList() {
      const list = document.getElementById("lesson-list");
      list.innerHTML = state.lessons.map((lesson, index) => `
        <button class="lesson-button ${index === state.active ? "active" : ""}" data-index="${index}">
          <strong>Lesson ${lesson.lessonId}: ${escapeHtml(lesson.title)}</strong>
          <span>${escapeHtml(lesson.learningTarget)}</span>
        </button>
      `).join("");

    document.addEventListener("click", (event) => {

      if (textInput) answer = textInput.value.trim();

      const expected = Array.isArray(question.answer) ? question.answer.join(", ") : String(question.answer ?? "");
      const correct = isDeterministicAnswerCorrect(question, answer);
      const isPractice = question.sectionType === "practice";
      feedback.className = `feedback ${correct ? "correct" : "incorrect"} show`;
      feedback.textContent = correct
        ? question.feedback
        : isPractice
          ? practiceRetryFeedback(question)
          : `Check this answer: ${expected}. ${question.feedback || ""}`;
      savePilotSubmission(question, answer, {

        confidence: 1,

      });

    function practiceRetryFeedback(question) {
      const hints = {
        "l1-p1": "Not yet. Undo +14 by subtracting 14 from both sides, then check your value.",
        "l1-p2": "Not yet. Undo the -6 first, then divide by the coefficient of x.",
        "l1-p3": "Not yet. Look closely at what should happen to +9 when you move it away from 2x."
      };
      return hints[question.id] || "Not yet. Use the worked example, revise your answer, and check again.";
    }

    function normalizeMathText(value) {
      return String(value ?? "")
        .toLowerCase()
        .replace(/[.,;:!?()[\]{}]/g, " ")
        .replace(/\b(one|two|three|four|five|six|seven|eight|nine|ten)\b/g, (match) => ({
          one: "1",
          two: "2",
          three: "3",
          four: "4",
          five: "5",
          six: "6",
          seven: "7",
          eight: "8",
          nine: "9",
          ten: "10"
        })[match])
        .replace(/\s+/g, " ")
        .trim();
    }

    function isDeterministicAnswerCorrect(question, answer) {
      if (question.options) return String(answer).toLowerCase() === String(question.answer).toLowerCase();
      if (question.type === "numeric") return Number(answer) === Number(question.answer);

      const normalizedAnswer = normalizeMathText(answer);
      const normalizedExpected = normalizeMathText(question.answer);

      if (question.id === "l1-vq1") {
        const mentionsFive = /\b5\b/.test(normalizedAnswer);
        const mentionsX = /\bx\b/.test(normalizedAnswer);
        const meansMultiply = /(times|multipl|product|groups of|value of x|whatever.*x|x.*value)/.test(normalizedAnswer);
        return mentionsFive && mentionsX && meansMultiply;
      }

      if (question.id === "l1-vq3") {
        const compact = normalizedAnswer.replace(/\s+/g, "");
        return compact.includes("-5/6") || compact.includes("negative5/6") || compact.includes("minus5/6");
      }

      return normalizedAnswer === normalizedExpected;
    }

      const studentId = "pilot-student";
      const lessonId = state.lessons[state.active]?.lessonId || "01";
      existing[studentId] = existing[studentId] || { studentId, studentName: "Test Student", lessons: {} };
      existing[studentId].lessons[lessonId] = existing[studentId].lessons[lessonId] || { lessonId, responses: {}, updatedAt: now };
      existing[studentId].lessons[lessonId].responses[question.id] = {
        questionId: question.id,
        sectionId: question.sectionId || "",
        sectionTitle: question.sectionTitle || "",
        prompt: question.prompt,
        type: question.type,
        grading: question.grading,
        answer,
        score: Number(result.score) || 0,
        maxScore: Number(result.maxScore) || 1,
        feedback: result.feedback || "",
        correct: Boolean(result.correct),
        confidence: Number(result.confidence ?? 1),
        needsTeacherReview: Boolean(result.needsTeacherReview),

      };
      existing[studentId].lessons[lessonId].updatedAt = now;
      localStorage.setItem(key, JSON.stringify(existing));
      ensurePilotAccount();

      }
    }

    const StudyBuddy = {
      history: [],
      isOpen: false,
      isLoading: false,

      init() {
        this.btn = document.querySelector(".study-buddy-btn");
        this.panel = document.querySelector(".study-buddy-panel");
        this.messagesEl = document.querySelector(".sb-messages");
        this.inputEl = document.querySelector(".sb-input");
        this.btn.addEventListener("click", () => this.toggle());
        document.querySelector(".sb-close").addEventListener("click", () => this.toggle());
        document.querySelector(".sb-send").addEventListener("click", () => this.handleSend());
        this.inputEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            this.handleSend();
          }
        });
        this.showWelcome();
      },

      toggle() {
        this.isOpen = !this.isOpen;
        this.panel.classList.toggle("open", this.isOpen);
        this.btn.classList.toggle("active", this.isOpen);
        if (this.isOpen) {
          this.inputEl.focus();
          this.scrollToBottom();
        }
      },

      showWelcome() {
        this.addBotMessage("Hi! I'm your CAASPP Math Study Buddy. Ask me to explain a step, check your reasoning, or make a similar practice problem.");
        const suggestions = document.createElement("div");
        suggestions.className = "sb-suggestions";
        [
          "Help me start Lesson 1",
          "Quiz me on inverse operations",
          "What does coefficient mean?"
        ].forEach((text) => {
          const chip = document.createElement("button");
          chip.className = "sb-suggestion";
          chip.type = "button";
          chip.textContent = text;
          chip.addEventListener("click", () => {
            suggestions.remove();
            this.sendMessage(text);
          });
          suggestions.appendChild(chip);
        });
        this.messagesEl.appendChild(suggestions);
      },

      formatMarkdown(text) {
        let html = escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        return html.split("\n").map((line) => line.trim() ? `<p>${line}</p>` : "<br>").join("");
      },

      addBotMessage(text) {
        const message = document.createElement("div");
        message.className = "sb-msg sb-msg-bot";
        message.innerHTML = this.formatMarkdown(text);
        this.messagesEl.appendChild(message);
        this.scrollToBottom();
      },

      addUserMessage(text) {
        const message = document.createElement("div");
        message.className = "sb-msg sb-msg-user";
        message.textContent = text;
        this.messagesEl.appendChild(message);
        this.scrollToBottom();
      },

      showTyping() {
        const typing = document.createElement("div");
        typing.className = "sb-msg sb-msg-bot sb-typing";
        typing.id = "sb-typing";
        typing.innerHTML = "<span></span><span></span><span></span>";
        this.messagesEl.appendChild(typing);
        this.scrollToBottom();
      },

      hideTyping() {
        const typing = document.getElementById("sb-typing");
        if (typing) typing.remove();
      },

      scrollToBottom() {
        requestAnimationFrame(() => {
          this.messagesEl.scrollTop = this.messagesEl.scrollHeight;
        });
      },

      handleSend() {
        const text = this.inputEl.value.trim();
        if (!text || this.isLoading) return;
        this.inputEl.value = "";
        this.sendMessage(text);
      },

      async sendMessage(text) {
        const suggestions = this.messagesEl.querySelector(".sb-suggestions");
        if (suggestions) suggestions.remove();

        this.addUserMessage(text);
        this.history.push({ role: "user", content: text });
        this.isLoading = true;
        this.inputEl.disabled = true;
        this.showTyping();

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              messages: this.history,
              lessonContext: currentLessonContext()
            })
          });
          const data = await response.json();
          this.hideTyping();
          if (response.ok && data.reply) {
            this.history.push({ role: "assistant", content: data.reply });
            this.addBotMessage(data.reply);
          } else {
            this.addBotMessage(data.error || "I couldn't answer that right now. Try again in a moment.");
          }
        } catch {
          this.hideTyping();
          this.addBotMessage("I couldn't connect right now. Try again in a moment.");
        } finally {
          this.isLoading = false;
          this.inputEl.disabled = false;
          this.inputEl.focus();
        }

        if (this.history.length > 20) {
          this.history = this.history.slice(-20);
        }
      }
    };

        <section class="section-card"><div class="section-body">
          <strong>Preview failed to load.</strong>
          <p>${escapeHtml(error.message)}</p>
          <p>Open this through a local web server so the lesson JSON files can load.</p>
        </div></section>
      `;
    });
    async function setupCourseNav() {
      const nav = document.getElementById("course-nav");
      const profile = window.CAASPPAuth ? await CAASPPAuth.getProfile() : null;
      if (!profile) return;
      if (profile.role === "student") {
        nav.innerHTML = `
          <a href="student-dashboard.html">Student Dashboard</a>
          <a href="preview.html">Course Home</a>
          <button id="preview-sign-out" type="button">Sign Out</button>
        `;
      }
      nav.classList.add("visible");
      document.getElementById("preview-sign-out").addEventListener("click", () => {
        if (window.CAASPPAuth) CAASPPAuth.signOut();
        else window.location.href = "index.html";
      });
    }

    setupCourseNav();
    StudyBuddy.init();
  </script>
</body>
</html>
