<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAASPP Math - Student Dashboard</title>
  <style>
    :root { --primary:#0f263f; --blue:#2457a6; --gold:#b7791f; --line:#d9e1e8; --soft:#f5f8fb; --text:#17202a; --green:#0f7a3f; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI", system-ui, sans-serif; background:#eef3f7; color:var(--text); line-height:1.45; }
    header { background:var(--primary); color:#fff; border-bottom:5px solid #f2b84b; }
    .wrap { max-width:1180px; margin:0 auto; padding:0 clamp(14px,3vw,32px); }
    header .wrap { min-height:76px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; padding-top:14px; padding-bottom:14px; }
    .brand { display:flex; align-items:center; gap:14px; }
    h1,h2,h3,p { margin-top:0; }
    h1 { margin:0; font-size:clamp(1.25rem,3vw,1.8rem); letter-spacing:0; }
    main.wrap { padding-top:22px; padding-bottom:38px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { border:0; border-radius:6px; padding:9px 12px; font:inherit; font-weight:800; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
    .btn-primary { background:var(--blue); color:#fff; }
    .btn-secondary { background:#fff; color:var(--text); border:1px solid var(--line); }
    .hero,.card { background:#fff; border:1px solid var(--line); border-radius:8px; box-shadow:0 10px 28px rgba(23,32,42,.08); }
    .hero { padding:22px; margin-bottom:16px; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .hero h2 { color:var(--primary); margin-bottom:6px; }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:16px; }
    .card { padding:14px; }
    .card.active { border-left:5px solid var(--blue); background:#edf6ff; }
    .lesson-list { display:grid; gap:10px; }
    .lesson-row { background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; }
    .pill { display:inline-flex; border-radius:999px; padding:4px 8px; background:#eef3f7; color:#5d6b7a; font-size:.8rem; font-weight:800; }
    .pill.active { background:#e8f7ee; color:var(--green); }
    @media (max-width:800px) { .grid { grid-template-columns:1fr; } .actions,.btn { width:100%; } }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand"><div><h1>CAASPP Math</h1><div id="user-name"></div></div></div>
      <div class="actions"><a class="btn btn-secondary" href="preview.html">Open Course</a><button class="btn btn-secondary" id="logout">Sign Out</button></div>
    </div>
  </header>
  <main class="wrap">
    <section class="hero">
      <div>
        <h2>Your CAASPP Math Prep</h2>
        <p>Start with Lesson 1. As you complete lessons, this dashboard will show your progress and next review steps.</p>
      </div>
      <a class="btn btn-primary" href="preview.html?lesson=01">Open Lesson 1</a>
    </section>
    <section class="grid">
      <div class="card active"><strong>Module 1</strong><p>Linear foundations</p></div>
      <div class="card"><strong>Module 2</strong><p>Systems and modeling</p></div>
      <div class="card"><strong>Module 3</strong><p>Functions and data</p></div>
      <div class="card"><strong>Module 4</strong><p>Mixed CAASPP practice</p></div>
    </section>
    <section class="lesson-list" id="lessons"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shared-course-data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const titles = ["Undo the Equation","Inequalities Are Ranges","Lines Tell Stories","Slope, Intercepts, and Meaning","Function Notation and Mini Performance Task"];
    async function init() {
      const profile = await CAASPPAuth.requireRole(["student"]);
      if (!profile) return;
      document.getElementById("user-name").textContent = profile.full_name;
      await CourseData.ensureEnrollment(profile.id, "student");
      document.getElementById("lessons").innerHTML = Array.from({ length: 20 }, (_, i) => {
        const n = i + 1;
        const active = n === 1;
        return `<div class="lesson-row">
          <div><strong>Lesson ${String(n).padStart(2, "0")}: ${titles[i] || `Module ${Math.ceil(n / 5)} Lesson ${n}`}</strong><br><span class="pill ${active ? "active" : ""}">${active ? "Open" : "Upcoming"}</span></div>
          ${active ? `<a class="btn btn-primary" href="preview.html?lesson=01">Start</a>` : `<span class="pill">Coming Soon</span>`}
        </div>`;
      }).join("");
    }
    document.getElementById("logout").addEventListener("click", CAASPPAuth.signOut);
    init();
  </script>
</body>
</html>
