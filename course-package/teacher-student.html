<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAASPP Math Work Sample</title>
  <style>
    :root {
      --primary: #0f263f;
      --blue: #2457a6;
      --gold: #b7791f;
      --green: #0f7a3f;
      --orange: #9a6216;
      --red: #b42318;
      --white: #ffffff;
      --soft: #f5f8fb;
      --line: #d9e1e8;
      --muted: #5d6b7a;
      --text: #17202a;
      --shadow: 0 10px 28px rgba(23, 32, 42, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #eef3f7;
      color: var(--text);
      line-height: 1.5;
    }

    .site-header {
      background: var(--primary);
      color: var(--white);
      border-bottom: 5px solid #f2b84b;
    }

    .page-wrapper {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 clamp(14px, 3vw, 32px);
    }

    .site-header .page-wrapper {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 14px;
      padding-bottom: 14px;
    }

    h1, h2, h3, h4, p { margin-top: 0; }
    h1 { margin: 0; font-size: clamp(1.25rem, 3vw, 1.8rem); letter-spacing: 0; }
    header p { margin: 4px 0 0; color: #d7e3ef; }

    a, button, input, textarea {
      font: inherit;
    }

    a.btn,
    button {
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 38px;
    }

    .btn-primary { background: var(--blue); color: var(--white); }
    .btn-accent { background: var(--gold); color: var(--white); }
    .btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--line); }
    .btn-danger { background: var(--red); color: var(--white); }
    .btn-save { background: var(--green); color: var(--white); }
    .btn-regrade { background: var(--blue); color: var(--white); }
    .btn-small { min-height: 30px; padding: 5px 9px; font-size: 0.82rem; }

    main.page-wrapper {
      padding-top: 22px;
      padding-bottom: 40px;
    }

    .student-info-bar,
    .response-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .student-info-bar {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .student-info-bar h2 {
      margin-bottom: 4px;
      color: var(--primary);
    }

    .student-meta {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .work-sample-title {
      display: grid;
      gap: 3px;
    }

    .work-sample-kicker {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .grade-line {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      font-weight: 800;
      color: var(--primary);
    }

    .grade-line strong {
      font-size: 1.25rem;
    }

    .score-summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .score-summary-item {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 12px;
    }

    .score-summary-item span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .score-summary-item strong {
      display: block;
      color: var(--primary);
      font-size: 1rem;
      margin-top: 3px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .response-card-header {
      padding: 14px 18px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .response-card-header h3 {
      margin: 0;
      color: var(--primary);
    }

    .response-card-body {
      padding: 18px;
    }

    .score-pill,
    .status-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-weight: 800;
    }

    .score-high { background: #e8f7ee; color: var(--green); }
    .score-mid { background: #fff8e6; color: var(--orange); }
    .score-low { background: #fff0ee; color: var(--red); }
    .score-empty { background: #eef3f7; color: var(--muted); }

    .question-block {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      margin-bottom: 12px;
      background: #fff;
    }

    .question-block h4 {
      margin: 0 0 8px;
      color: #344255;
    }

    .math-expression {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      vertical-align: middle;
    }

    .math-negative {
      font-weight: 800;
      margin-right: 1px;
    }

    .fraction {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      min-width: 1.15em;
      margin: 0 1px;
      vertical-align: middle;
      font-variant-numeric: lining-nums tabular-nums;
    }

    .fraction span:first-child {
      border-bottom: 2px solid currentColor;
      line-height: 1;
      width: 100%;
      text-align: center;
      padding: 0 2px 2px;
    }

    .fraction span:last-child {
      line-height: 1;
      padding-top: 2px;
    }

    .student-answer {
      background: var(--soft);
      border-left: 4px solid var(--blue);
      border-radius: 6px;
      padding: 10px 12px;
      margin: 8px 0;
      white-space: pre-wrap;
    }

    .teacher-feedback {
      background: #f8fbff;
      border-left: 3px solid #8ab4f8;
      border-radius: 6px;
      color: #344255;
      font-size: 0.92rem;
      padding: 9px 10px;
      margin-bottom: 10px;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .question-meta h4 {
      flex: 1;
    }

    .section-score {
      font-size: 0.9rem;
    }

    .override-panel {
      border: 1px solid #dce6ef;
      border-radius: 6px;
      background: #fbfdff;
      padding: 8px 10px;
      margin-top: 10px;
    }

    .override-panel summary {
      cursor: pointer;
      color: var(--blue);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .edit-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #b9c7d5;
      border-radius: 6px;
      padding: 9px 10px;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    @media (max-width: 700px) {
      .actions,
      .site-header .page-wrapper {
        align-items: stretch;
      }

      a.btn,
      button {
        flex: 1 1 auto;
      }

      .edit-row {
        grid-template-columns: 1fr;
      }

      .score-summary-strip {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media print {
      .site-header,
      .actions,
      .btn,
      .no-print {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .student-info-bar,
      .response-card {
        box-shadow: none;
        border-color: #ccc;
      }

      .score-summary-strip {
        grid-template-columns: repeat(4, 1fr);
      }

      .question-block {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="page-wrapper">
      <div>
        <h1 id="page-title">Work Sample</h1>
        <p>Lesson 01: Undo the Equation</p>
      </div>
      <div class="actions">
        <a class="btn btn-secondary" href="teacher-dashboard.html">Back to Gradebook</a>
        <a class="btn btn-secondary" href="preview.html?lesson=01">Preview Lesson</a>
      </div>
    </div>
  </header>

  <main class="page-wrapper" id="root"></main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/shared-course-data.js?v=class-sections-1"></script>
  <script>
    const ACCOUNT_KEY = "caasppMathPilotAccounts";
    const SUBMISSION_KEY = "caasppMathPilotSubmissions";
    const COURSE_ASSET_VERSION = "2026-06-05-exit-check-v2";
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get("student") || "pilot-student";
    const lessonNumber = Number(params.get("lesson") || "1") || 1;
    let lessonData = null;
    let remoteResponses = null;
    let remoteGradebookRows = null;

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    function getAccounts() {
      const saved = JSON.parse(localStorage.getItem(ACCOUNT_KEY) || "[]");
      if (saved.length) return saved;
      return [{ id: "pilot-student", role: "student", name: "Test Student", login: "test.student" }];
    }

    function getSubmissions() {
      return JSON.parse(localStorage.getItem(SUBMISSION_KEY) || "{}");
    }

    function saveSubmissions(submissions) {
      localStorage.setItem(SUBMISSION_KEY, JSON.stringify(submissions));
    }

    function flattenQuestions(lesson) {
      return lesson.sections.flatMap((section) => {
        const questions = [...(section.questions || []), ...(section.contextQuestions || [])];
        return questions.map((question) => ({ ...question, sectionId: section.id, sectionTitle: section.title }));
      });
    }

    function sectionQuestions(section) {
      return [...(section.questions || []), ...(section.contextQuestions || [])]
        .map((question) => ({ ...question, sectionId: section.id, sectionTitle: section.title }));
    }

    function scoreClass(percent) {
      if (percent === null) return "score-empty";
      if (percent >= 80) return "score-high";
      if (percent >= 60) return "score-mid";
      return "score-low";
    }

    function lessonStats(responses) {
      const items = Object.values(responses || {});
      const score = items.reduce((sum, item) => sum + Number(item.score || 0), 0);
      const maxScore = items.reduce((sum, item) => sum + Number(item.maxScore ?? 1), 0);
      const percent = maxScore ? Math.round((score / maxScore) * 100) : null;
      const exitItems = items.filter((item) => item.sectionId === "check");
      const exitScore = exitItems.reduce((sum, item) => sum + Number(item.score || 0), 0);
      const exitMaxScore = exitItems.reduce((sum, item) => sum + Number(item.maxScore ?? 1), 0);
      const exitPercent = exitMaxScore ? exitScore / exitMaxScore : 1;
      const exitNeedsReview = exitItems.length >= 5 && exitPercent < 0.7;
      const needsTeacherReview = items.some((item) => item.needsTeacherReview) || exitNeedsReview;
      return { items, score, maxScore, percent, needsTeacherReview, exitNeedsReview };
    }

    function letterGrade(percent) {
      if (percent === null) return "Not Started";
      if (percent >= 90) return "A";
      if (percent >= 80) return "B";
      if (percent >= 70) return "C";
      if (percent >= 60) return "D";
      return "F";
    }

    function completionStatus(stats) {
      if (stats.percent === null) return "Not Started";
      return `${stats.items.length} of ${flattenQuestions(lessonData).length}`;
    }

    function gradeLine(stats) {
      if (!stats.maxScore) return "Not started";
      return `${stats.score}/${stats.maxScore} - ${stats.percent}% - ${letterGrade(stats.percent)}`;
    }

    function formatScore(response, fallbackMax) {
      if (!response) return "-";
      return `${response.score ?? 0} / ${response.maxScore ?? fallbackMax ?? 1}`;
    }

    function formatAnswer(response) {
      if (!response || response.answer === "") return "(no answer yet)";
      return response.answer;
    }

    function sectionStats(section, responses) {
      const questions = sectionQuestions(section);
      const answered = questions.filter((question) => responses[question.id]).length;
      const scored = questions.reduce((sum, question) => sum + Number(responses[question.id]?.score || 0), 0);
      const max = questions.reduce((sum, question) => {
        const response = responses[question.id];
        return sum + Number(response?.maxScore ?? question.maxPoints ?? (question.grading === "ai_rubric" ? 3 : 1));
      }, 0);
      return { questions, answered, scored, max };
    }

    async function load() {
      const lessonResponse = await fetch(`lessons/lesson-01.json?v=${COURSE_ASSET_VERSION}`);
      lessonData = await lessonResponse.json();
      if (window.CourseData && studentId !== "pilot-student") {
        const rows = await window.CourseData.loadStudentResponses(studentId, lessonNumber);
        remoteResponses = Array.isArray(rows) && rows.length ? rows : null;
        const gradebookRows = await window.CourseData.loadGradebook();
        remoteGradebookRows = Array.isArray(gradebookRows) ? gradebookRows : null;
      }
      render();
    }

    function render() {
      const remoteGradebookRow = (remoteGradebookRows || []).find((row) => row.student_id === studentId);
      const account = getAccounts().find((item) => item.id === studentId) || {
        id: studentId,
        role: "student",
        name: remoteGradebookRow?.full_name || "Student",
        login: remoteGradebookRow?.username || remoteGradebookRow?.email || ""
      };
      const submission = remoteResponses
        ? { responses: remoteResponsesToMap(remoteResponses), updatedAt: latestRemoteUpdate(remoteResponses) }
        : getSubmissions()[studentId]?.lessons?.["01"] || { responses: {}, updatedAt: "" };
      const stats = lessonStats(submission.responses);
      document.title = `${account.name} - CAASPP Math Work Sample`;
      document.getElementById("page-title").textContent = "CAASPP Math Work Sample";

      const root = document.getElementById("root");
      root.innerHTML = `
        <section class="student-info-bar">
          <div class="work-sample-title">
            <div class="work-sample-kicker">CAASPP Math Success Academy</div>
            <h2>${escapeHtml(account.name)}</h2>
            <div class="student-meta">Lesson ${String(lessonNumber).padStart(2, "0")}: ${escapeHtml(lessonData.title)}${account.login ? ` - ${escapeHtml(account.login)}` : ""}${submission.updatedAt ? ` - Last activity ${new Date(submission.updatedAt).toLocaleString()}` : ""}</div>
            <div class="grade-line"><strong>${escapeHtml(gradeLine(stats))}</strong></div>
          </div>
          <div class="actions">
            <button class="btn-primary" type="button" onclick="window.print()">Print Work Sample</button>
            <button class="btn-danger" type="button" id="btn-reset">Reset Lesson</button>
          </div>
        </section>

        <section class="score-summary-strip">
          <div class="score-summary-item"><span>Course</span><strong>CAASPP Math</strong></div>
          <div class="score-summary-item"><span>Lesson</span><strong>${String(lessonNumber).padStart(2, "0")}: ${escapeHtml(lessonData.title)}</strong></div>
          <div class="score-summary-item"><span>Answered</span><strong>${escapeHtml(completionStatus(stats))}</strong></div>
          <div class="score-summary-item"><span>Overall Grade</span><strong>${escapeHtml(gradeLine(stats))}</strong></div>
        </section>

        ${lessonData.sections.map((section) => renderSection(section, submission.responses)).join("")}
        ${renderExtraResponses(submission.responses)}
      `;

      document.getElementById("btn-reset").addEventListener("click", resetLesson);
      document.querySelectorAll("[data-save-feedback]").forEach((button) => {
        button.addEventListener("click", () => saveFeedback(button.dataset.saveFeedback));
      });
      document.querySelectorAll("[data-regrade-ai]").forEach((button) => {
        button.addEventListener("click", () => regradeSingleAiResponse(button.dataset.regradeAi));
      });
    }

    function remoteResponsesToMap(rows) {
      return rows.reduce((map, row) => {
        map[row.question_id] = {
          questionId: row.question_id,
          sectionId: row.section_id,
          sectionTitle: row.section_title,
          prompt: row.prompt,
          type: row.question_type,
          grading: row.grading_method,
          answer: row.answer || "",
          score: Number(row.score || 0),
          maxScore: Number(row.max_score ?? 1),
          feedback: row.feedback || "",
          correct: Number(row.score || 0) >= Number(row.max_score ?? 1),
          confidence: row.ai_confidence,
          needsTeacherReview: row.needs_teacher_review,
          updatedAt: row.updated_at || row.created_at || ""
        };
        return map;
      }, {});
    }

    function latestRemoteUpdate(rows) {
      const dates = rows.map((row) => row.updated_at || row.created_at).filter(Boolean).sort();
      return dates[dates.length - 1] || "";
    }

    function renderSection(section, responses) {
      const { questions, answered, scored, max } = sectionStats(section, responses);
      if (!questions.length) return "";
      return `
        <section class="response-card">
          <div class="response-card-header">
            <h3>${escapeHtml(section.title)}</h3>
            <span class="status-pill score-empty section-score">${scored}/${max} points - ${answered}/${questions.length} answered</span>
          </div>
          <div class="response-card-body">
            ${questions.map((question) => renderQuestion(question, responses[question.id])).join("")}
          </div>
        </section>
      `;
    }

    function renderExtraResponses(responses) {
      const knownIds = new Set(flattenQuestions(lessonData).map((question) => question.id));
      const extras = Object.values(responses || {}).filter((response) => !knownIds.has(response.questionId));
      if (!extras.length) return "";
      return `
        <section class="response-card">
          <div class="response-card-header">
            <h3>Finish Line</h3>
            <span class="status-pill score-mid">${extras.length} submitted</span>
          </div>
          <div class="response-card-body">
            ${extras.map((response) => renderQuestion({
              id: response.questionId,
              prompt: response.prompt,
              type: response.type,
              grading: response.grading,
              maxPoints: response.maxScore
            }, response)).join("")}
          </div>
        </section>
      `;
    }

    function renderQuestion(question, response) {
      const feedback = response?.feedback || "";
      const canRegrade = question.grading === "ai_rubric" && response?.answer;
      return `
        <div class="question-block">
          <div class="question-meta">
            <h4>${question.promptHtml || escapeHtml(question.prompt)}</h4>
            <span class="status-pill score-empty">${escapeHtml(formatScore(response, question.maxPoints ?? (question.grading === "ai_rubric" ? 3 : 1)))}</span>
          </div>
          <div class="student-answer">${escapeHtml(formatAnswer(response))}</div>
          <div class="teacher-feedback"><strong>Feedback:</strong> ${escapeHtml(feedback || "No feedback yet.")}</div>
          <details class="override-panel no-print">
            <summary>Adjust score or feedback</summary>
            ${question.answer !== undefined ? `<div class="teacher-feedback" style="margin-top:10px;"><strong>Answer key:</strong> ${escapeHtml(question.answer)}</div>` : ""}
            <div class="edit-row">
              <label for="score-${escapeHtml(question.id)}">Score</label>
              <input id="score-${escapeHtml(question.id)}" type="text" value="${escapeHtml(formatScore(response, question.maxPoints ?? (question.grading === "ai_rubric" ? 3 : 1)))}">
            </div>
            <div class="edit-row">
              <label for="feedback-${escapeHtml(question.id)}">Feedback</label>
              <textarea id="feedback-${escapeHtml(question.id)}">${escapeHtml(feedback)}</textarea>
            </div>
            <div class="actions" style="margin-top:10px;">
              <button class="btn-save btn-small" type="button" data-save-feedback="${escapeHtml(question.id)}">Save Override</button>
              ${canRegrade ? `<button class="btn-regrade btn-small" type="button" data-regrade-ai="${escapeHtml(question.id)}">Regrade AI</button>` : ""}
            </div>
          </details>
        </div>
      `;
    }

    async function saveFeedback(questionId) {
      const submissions = getSubmissions();
      const lesson = submissions[studentId]?.lessons?.["01"];
      const response = remoteResponses
        ? remoteResponsesToMap(remoteResponses)[questionId]
        : lesson?.responses?.[questionId];
      if (!response) return;

      const scoreValue = document.getElementById(`score-${questionId}`).value;
      const [scoreRaw, maxRaw] = scoreValue.split("/").map((part) => Number(String(part || "").trim()));
      const nextScore = Number.isFinite(scoreRaw) ? scoreRaw : response.score;
      const nextMaxScore = Number.isFinite(maxRaw) ? maxRaw : response.maxScore;
      const nextFeedback = document.getElementById(`feedback-${questionId}`).value.trim();

      if (remoteResponses && window.CourseData) {
        await window.CourseData.updateQuestionResponse({
          studentId,
          lessonNumber,
          questionId,
          score: nextScore,
          maxScore: nextMaxScore,
          feedback: nextFeedback,
          gradingMethod: "teacher_override",
          confidence: response.confidence,
          needsTeacherReview: false
        });
        await load();
        return;
      }

      if (!lesson?.responses?.[questionId]) return;
      lesson.responses[questionId].score = nextScore;
      lesson.responses[questionId].maxScore = nextMaxScore;
      lesson.responses[questionId].feedback = nextFeedback;
      lesson.responses[questionId].grading = "teacher_override";
      lesson.responses[questionId].needsTeacherReview = false;
      lesson.updatedAt = new Date().toISOString();
      saveSubmissions(submissions);
      render();
    }

    function resetLesson() {
      const submissions = getSubmissions();
      if (submissions[studentId]?.lessons?.["01"]) delete submissions[studentId].lessons["01"];
      saveSubmissions(submissions);
      render();
    }

    async function regradeSingleAiResponse(questionId) {
      const submissions = getSubmissions();
      const lesson = submissions[studentId]?.lessons?.["01"];
      const question = flattenQuestions(lessonData).find((item) => item.id === questionId);
      const response = remoteResponses
        ? remoteResponsesToMap(remoteResponses)[questionId]
        : lesson?.responses?.[questionId];
      const button = document.querySelector(`[data-regrade-ai="${CSS.escape(questionId)}"]`);
      if (!question || !response?.answer || !button) return;

      button.disabled = true;
      button.textContent = "Regrading...";

      try {
        const gradeResponse = await fetch("/api/grade", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question,
            questionText: question.prompt,
            studentAnswer: response.answer,
            rubricId: question.rubricId,
            lessonContext: { lessonId: "01", lessonTitle: lessonData.title, learningTarget: lessonData.learningTarget },
            maxPoints: question.maxPoints || 3
          })
        });
        if (!gradeResponse.ok) {
          const errorData = await gradeResponse.json().catch(() => ({}));
          throw new Error(errorData.error || "AI grading is unavailable.");
        }
        const result = await gradeResponse.json();

        if (remoteResponses && window.CourseData) {
          await window.CourseData.updateQuestionResponse({
            studentId,
            lessonNumber,
            questionId,
            score: result.score,
            maxScore: result.maxScore,
            feedback: result.feedback,
            gradingMethod: "ai_rubric",
            confidence: result.confidence,
            needsTeacherReview: result.needsTeacherReview
          });
          await load();
          return;
        }

        if (!lesson?.responses?.[questionId]) return;
        lesson.responses[questionId] = { ...response, ...result, grading: "ai_rubric", updatedAt: new Date().toISOString() };
        lesson.updatedAt = new Date().toISOString();
        saveSubmissions(submissions);
        render();
      } catch (error) {
        button.textContent = "AI Unavailable";
        button.disabled = false;
        const feedbackBox = document.getElementById(`feedback-${questionId}`);
        if (feedbackBox) feedbackBox.value = error.message || "AI regrade is unavailable from this link. Use the local/Vercel course link with the grading API enabled.";
        return;
      }
    }

    load().catch((error) => {
      document.getElementById("root").innerHTML = `<section class="response-card"><div class="response-card-body">Could not load work sample: ${escapeHtml(error.message)}</div></section>`;
    });
  </script>
</body>
</html>
